# Opt-in pre-commit hooks.
# To activate: bun run hooks:install
# To deactivate: bun run hooks:uninstall
#
# These hooks are NOT auto-installed. Each developer
# chooses whether to use them.

no_auto_install: true

pre-commit:
  parallel: false
  commands:
    secrets:
      run: bun run secrets:check:staged
    lint:
      glob: "**/*.{ts,tsx,js,jsx}"
      run: bun --bun oxlint -c oxlint.config.ts --threads=2 --deny-warnings --no-error-on-unmatched-pattern --fix {staged_files}
      stage_fixed: true
    format:
      glob: "**/*.{ts,tsx,js,jsx,json,css}"
      run: bun --bun oxfmt -c .oxfmtrc.json --no-error-on-unmatched-pattern {staged_files}
      stage_fixed: true
    i18n:
      glob: "apps/web/src/i18n/langs/*.{json,ts}"
      run: bun run i18n:sync
      stage_fixed: true
    ai-skills:
      glob: "{.agents/skills,.ai/local-skills,.ai/shared/skills,.claude/commands}/**"
      run: bash scripts/check-ai-skill-sources.sh

pre-push:
  parallel: false
  commands:
    typecheck:
      # Scoped to packages changed vs. origin/main plus their dependents
      # (turbo `...[ref]` filter). tsgo itself still runs project-wide
      # within each selected package, but unaffected packages are skipped
      # entirely instead of being walked for cache decisions.
      run: bun run typecheck "--filter=...[origin/main]" --concurrency=2
    # Lint runs in CI on every push (~10-15 min full-monorepo). Keeping
    # it on pre-push too added another ~15-18 min of waiting that
    # duplicated the CI signal, so the local hook drops it. The
    # pre-commit hook still lints staged files inline for fast feedback
    # on the most common class of mistakes.
    format:
      run: bun run format --concurrency=2 -- --check
    i18n:
      run: bun run i18n:check
    ai-skills:
      run: bash scripts/check-ai-skill-sources.sh
