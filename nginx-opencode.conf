events {}

http {
  upstream opencode {
    server opencode:4095;
  }

  server {
    listen 4096;

    location / {
      auth_request /_validate;
      auth_request_set $x_stella_user $upstream_http_x_stella_user;
      auth_request_set $x_stella_org $upstream_http_x_stella_org;
      auth_request_set $x_stella_scopes $upstream_http_x_stella_scopes;

      proxy_set_header x-stella-user $x_stella_user;
      proxy_set_header x-stella-org $x_stella_org;
      proxy_set_header x-stella-scopes $x_stella_scopes;
      proxy_pass http://opencode;
    }

    location = /_validate {
      internal;
      proxy_pass http://api:3001/internal/opencode/verify-token;
      proxy_pass_request_body off;
      proxy_set_header Content-Length "";
      proxy_set_header Authorization $http_authorization;
    }
  }
}
