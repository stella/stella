<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="alternate icon" href="/favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <script type="module">
      import { PALETTE_STORAGE_KEY, THEME_STORAGE_KEY } from "/src/consts.ts";

      document.documentElement.classList.toggle(
        "dark",
        localStorage[THEME_STORAGE_KEY] === "dark" ||
          (localStorage[THEME_STORAGE_KEY] !== "light" &&
            matchMedia("(prefers-color-scheme: dark)").matches),
      );

      const palette = localStorage.getItem(PALETTE_STORAGE_KEY) || "neutral";

      if (palette !== "neutral") {
        document.documentElement.classList.add(`palette-${palette}`);
      }
    </script>
    <script type="module">
      import { getStorageKey } from "/src/consts.ts";

      if (import.meta.env.DEV) {
        try {
          const raw = localStorage.getItem(getStorageKey("dev"));
          const enabled = raw
            ? JSON.parse(raw).state?.reactGrab === true
            : false;
          if (enabled) {
            window.addEventListener(
              "react-grab:init",
              () => {
                window.__REACT_GRAB__?.setEnabled(true);
              },
              { once: true },
            );
            import("react-grab").catch(() => {
              // react-grab failed to load; stays unloaded
            });
          }
        } catch {
          // react-grab stays unloaded
        }
      }
    </script>
    <style>
      @media (prefers-color-scheme: dark) {
        body:has(#browser-warning:not([hidden])) {
          background-color: #1a1a1a;
        }
        body:has(#browser-warning:not([hidden])) #browser-warning {
          color: #e5e5e5 !important;
        }
        body:has(#browser-warning:not([hidden])) #browser-warning h1 {
          color: #f5f5f5 !important;
        }
        body:has(#browser-warning:not([hidden])) #browser-warning p {
          color: #aaa !important;
        }
      }
    </style>
  </head>
  <body>
    <div
      id="browser-warning"
      hidden
      style="
        display: none;
        font-family:
          -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, Roboto,
          Helvetica, Arial, sans-serif;
        max-width: 520px;
        margin: 120px auto;
        padding: 32px;
        text-align: center;
        color: #1a1a1a;
        line-height: 1.6;
      "
    >
      <h1 style="font-size: 20px; font-weight: 600; margin: 0 0 12px">
        Browser not supported
      </h1>
      <p style="font-size: 14px; color: #555; margin: 0 0 20px">
        Stella requires a modern browser. Please update to one of the following:
      </p>
      <p style="font-size: 14px; color: #333; margin: 0; line-height: 2">
        Chrome 110+<br />
        Safari 16+<br />
        Firefox 115+<br />
        Edge 110+
      </p>
    </div>
    <div id="app"></div>
    <script>
      try {
        [].toSorted();
      } catch (e) {
        var w = document.getElementById("browser-warning");
        var a = document.getElementById("app");
        if (w) (w.removeAttribute("hidden"), (w.style.display = "block"));
        if (a) a.remove();
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
