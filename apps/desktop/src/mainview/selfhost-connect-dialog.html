<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Connect self-hosted Stella</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        align-items: center;
        background: #1c1c1e;
        color: #f5f5f7;
        display: flex;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        height: 100vh;
        justify-content: center;
        -webkit-user-select: none;
        user-select: none;
      }
      .dialog {
        max-width: 390px;
        padding: 28px 24px 20px;
        width: 100%;
      }
      .mark {
        align-items: center;
        background: #2c2c2e;
        border: 1px solid #48484a;
        border-radius: 12px;
        color: #f5f5f7;
        display: flex;
        font-size: 20px;
        font-weight: 600;
        height: 48px;
        justify-content: center;
        margin: 0 auto 18px;
        width: 48px;
      }
      .title {
        font-size: 16px;
        font-weight: 600;
        line-height: 1.35;
        margin-bottom: 8px;
        text-align: center;
      }
      .subtitle {
        color: #a1a1a6;
        font-size: 13px;
        line-height: 1.45;
        margin-bottom: 18px;
        text-align: center;
      }
      .details {
        background: #2c2c2e;
        border: 1px solid #3a3a3c;
        border-radius: 8px;
        display: grid;
        gap: 10px;
        margin-bottom: 20px;
        padding: 12px;
      }
      .label {
        color: #8e8e93;
        display: block;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.02em;
        margin-bottom: 3px;
        text-transform: uppercase;
      }
      .value {
        color: #f5f5f7;
        direction: ltr;
        display: block;
        font-size: 12px;
        line-height: 1.4;
        overflow-wrap: anywhere;
        -webkit-user-select: text;
        user-select: text;
      }
      .actions {
        display: flex;
        gap: 10px;
      }
      button {
        border: none;
        border-radius: 8px;
        cursor: pointer;
        flex: 1;
        font-size: 14px;
        font-weight: 500;
        padding: 10px 16px;
        transition: opacity 0.15s;
      }
      button:hover {
        opacity: 0.86;
      }
      button:active {
        opacity: 0.72;
      }
      .cancel {
        background: #2c2c2e;
        border: 1px solid #3a3a3c;
        color: #f5f5f7;
      }
      .connect {
        background: #0a84ff;
        color: #fff;
      }
      @media (prefers-color-scheme: light) {
        body {
          background: #f2f2f7;
          color: #1c1c1e;
        }
        .mark,
        .details,
        .cancel {
          background: #fff;
          border-color: #d1d1d6;
          color: #1c1c1e;
        }
        .subtitle,
        .label {
          color: #636366;
        }
        .value {
          color: #1c1c1e;
        }
      }
    </style>
  </head>
  <body>
    <main class="dialog">
      <div class="mark">§</div>
      <h1 class="title">Connect this self-hosted Stella?</h1>
      <p class="subtitle">
        Allow this Stella site to open documents in stella desktop.
      </p>
      <div class="details">
        <p>
          <span class="label">Web origin</span>
          <span class="value" id="webOrigin"></span>
        </p>
        <p>
          <span class="label">API URL</span>
          <span class="value" id="apiBaseUrl"></span>
        </p>
      </div>
      <div class="actions">
        <button class="cancel" id="cancelBtn">Cancel</button>
        <button class="connect" id="connectBtn">Connect</button>
      </div>
    </main>
    <script>
      const params = new URLSearchParams(window.location.hash.slice(1));
      const webOrigin = params.get("webOrigin") || "";
      const apiBaseUrl = params.get("apiBaseUrl") || "";

      document.getElementById("webOrigin").textContent = webOrigin;
      document.getElementById("apiBaseUrl").textContent = apiBaseUrl;

      function respond(approved) {
        if (window.__TAURI_INTERNALS__) {
          window.__TAURI_INTERNALS__.invoke(
            "self_host_connect_dialog_respond",
            { approved: approved },
          );
        }
      }

      document
        .getElementById("cancelBtn")
        .addEventListener("click", function () {
          respond(false);
        });
      document
        .getElementById("connectBtn")
        .addEventListener("click", function () {
          respond(true);
        });
    </script>
  </body>
</html>
