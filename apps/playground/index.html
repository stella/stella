<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Folio — Playground</title>
    <script>
      // Detect dark mode BEFORE any rendering to prevent white flash
      if (window.matchMedia("(prefers-color-scheme: dark)").matches) {
        document.documentElement.classList.add("dark");
      }
    </script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html {
        background: #fff;
        color: #262626;
      }
      html.dark {
        background: #0c0c0c;
        color: #f5f5f5;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        -webkit-font-smoothing: antialiased;
        min-height: 100dvh;
        background: inherit;
        color: inherit;
      }
      #app {
        width: 100%;
        min-height: 100dvh;
      }

      .loading {
        display: flex;
        flex-direction: column;
        gap: 8px;
        padding: 16px;
        min-height: 100dvh;
      }
      .skeleton {
        border-radius: 4px;
        background: linear-gradient(
            120deg,
            transparent 40%,
            rgba(255, 255, 255, 0.64),
            transparent 60%
          )
          #e5e7eb 0 0 / 200% 100%;
        animation: skeleton 2s infinite;
      }
      html.dark .skeleton {
        background: linear-gradient(
            120deg,
            transparent 40%,
            rgba(255, 255, 255, 0.04),
            transparent 60%
          )
          #1a1a1a 0 0 / 200% 100%;
      }
      @keyframes skeleton {
        0% {
          background-position: 200% 0;
        }
        100% {
          background-position: -200% 0;
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="loading">
        <div class="skeleton" style="height: 44px; width: 100%"></div>
        <div
          class="skeleton"
          style="
            height: calc(100dvh - 68px);
            width: 60%;
            margin: 0 auto;
            border-radius: 2px;
          "
        ></div>
      </div>
    </div>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
