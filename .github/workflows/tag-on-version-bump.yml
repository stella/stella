name: Tag on VERSION bump

# Source-of-truth release trigger. When `VERSION` changes on `main`,
# this workflow validates the value, pushes a matching `v<value>` tag,
# and lets `release.yml` (triggered on `v*` tag push) take over to
# build the artifact and conditionally promote to production.

on:
  push:
    branches: [main]
    paths: [VERSION]
  # Manual recovery path. If the auto-trigger misses a VERSION bump
  # (e.g. a stuck "merge already in progress" lock causes GitHub to
  # land a follow-up empty squash commit on top of the real one, so
  # the path filter doesn't see VERSION change in the delivered
  # push event), run this workflow against `main` to push the tag.
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tag:
    name: Push release tag
    # Restrict to main. The push trigger above is already main-only,
    # but workflow_dispatch can be invoked against any ref. Without
    # this gate, anyone with write access could push a feature branch
    # with an arbitrary VERSION value, dispatch the workflow against
    # that branch, and mint a signed-release tag without going
    # through the merge-to-main review path.
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Mint App token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          client-id: ${{ vars.STELLA_RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.STELLA_RELEASE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Read and validate VERSION
        id: version
        run: |
          if [[ ! -f VERSION ]]; then
            echo "::error::VERSION file is missing"
            exit 1
          fi
          version="$(tr -d '[:space:]' < VERSION)"
          # Whitelist must match scripts/release-channel.sh,
          # release.yml, and release-desktop.yml so a VERSION value
          # accepted here is also accepted by every downstream gate.
          # `prod|stable|latest|...` are deliberately excluded — see
          # release-channel.sh for the rationale.
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-(rc|beta|alpha)\.[0-9]+)?$ ]]; then
            echo "::error::VERSION must look like 1.2.3, 1.2.3-rc.1, 1.2.3-beta.1, or 1.2.3-alpha.1; got '$version'"
            exit 1
          fi
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Skip if tag already exists
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          # /git/ref/{ref} is the EXACT-match endpoint. The plural
          # /git/refs/{ref} does prefix matching: a check for
          # `v0.1.0` would also match `v0.1.0-rc.1` and skip the
          # real tag push.
          if gh api "repos/${{ github.repository }}/git/ref/tags/$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists; nothing to do."
            echo "skip=true" >> "$GITHUB_ENV"
          fi

      - name: Push tag
        if: env.skip != 'true'
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          git config user.name "stella-release-deployer[bot]"
          git config user.email "stella-release-deployer[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "$TAG"
          git push origin "$TAG"
