name: Dependency Review

# Blocks PRs that introduce dependencies with known vulnerabilities
# or copyleft licenses incompatible with Apache-2.0 distribution.
#
# stella ships under Apache-2.0 with optional commercial-license
# arrangements (support, indemnity, custom terms). Absorbing copyleft
# (GPL, AGPL, LGPL) dependencies would force their terms onto stella
# as a whole and foreclose those commercial arrangements; we also
# can't sublicense copyrights we don't own.
#
# Allowed: MIT, Apache-2.0, BSD-2-Clause, BSD-3-Clause, ISC, 0BSD,
#          BlueOak-1.0.0, Unlicense, CC0-1.0, CC-BY-4.0, MIT-0,
#          MPL-2.0 (file-level copyleft, acceptable for unmodified use),
#          Python-2.0, Zlib
#
# Blocked: GPL-2.0, GPL-3.0, AGPL-3.0, LGPL-2.1, LGPL-3.0, SSPL-1.0,
#          BUSL-1.1, Elastic-2.0, Commons-Clause, CPAL-1.0
#
# See: https://choosealicense.com/appendix/
#
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event.pull_request.draft != true

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Dependency Review
        uses: actions/dependency-review-action@46a3c492319c890177366b6ef46d6b4f89743ed4 # v4
        with:
          fail-on-severity: high
          allow-licenses: >-
            MIT,
            Apache-2.0,
            BSD-2-Clause,
            BSD-3-Clause,
            ISC,
            0BSD,
            BlueOak-1.0.0,
            Unlicense,
            CC0-1.0,
            CC-BY-4.0,
            MIT-0,
            MPL-2.0,
            Python-2.0,
            Zlib
          # GitHub's dependency snapshot currently reports some Bun
          # workspace/catalog entries as license "Null" in PR summaries even
          # though the package manifests declare allowed licenses. Keep these
          # exceptions package-scoped; do not add namespace/group exceptions.
          allow-dependencies-licenses: >-
            pkg:npm/@ai-sdk/provider-utils,
            pkg:npm/@stll/docx-core,
            pkg:npm/jszip
          comment-summary-in-pr: always
