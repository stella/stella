name: Deploy main to staging

# Continuous deploy of every push to main into staging. The tagged
# release workflow remains the production path.

on:
  push:
    branches: [main]
  workflow_dispatch:

# A newer push to main supersedes an in-flight staging deploy.
concurrency:
  group: deploy-staging
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/stella-api

jobs:
  build-and-deploy:
    name: Build + deploy staging
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 75

    steps:
      - name: Resolve synthetic ref
        id: ref
        env:
          SHA: ${{ github.sha }}
        run: |
          short="${SHA:0:7}"
          echo "release_ref=main-${short}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${short}" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Login to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: apps/api/Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.ref.outputs.release_ref }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main-latest
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache-staging
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache-staging,mode=max
          build-args: |
            STELLA_VERSION=${{ steps.ref.outputs.release_ref }}
            STELLA_COMMIT_SHA=${{ github.sha }}

      # Best-effort on staging: the provenance action already retries
      # transient Sigstore blips, but a sustained Rekor outage must not
      # wedge continuous deploys (the image is built and pushed; only
      # the transparency-log attestation is unavailable). The step still
      # surfaces as failed in the UI. Production keeps attestation
      # blocking in release.yml.
      - name: Attest image provenance
        continue-on-error: true
        uses: ./.github/actions/provenance
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}

      - name: Mint App token for the infra repo
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.STELLA_RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.STELLA_RELEASE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: stella-infra
          permission-actions: write
          permission-contents: read

      - name: Dispatch and watch staging promote
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          INFRA_REPO: ${{ github.repository_owner }}/stella-infra
          RELEASE_REF: ${{ steps.ref.outputs.release_ref }}
          GIT_SHA: ${{ github.sha }}
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          dispatched_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          expected_title="Promote ${RELEASE_REF} → staging"
          dispatch_output="$(
            gh workflow run promote-release.yml \
              --repo "$INFRA_REPO" \
              --field release_ref="$RELEASE_REF" \
              --field target_environment=staging \
              --field image_digest="$IMAGE_DIGEST" \
              --field git_sha="$GIT_SHA" \
              --field run_migrations=true \
              --field frontend=true 2>&1
          )"
          printf '%s\n' "$dispatch_output"

          run_id="$(
            printf '%s\n' "$dispatch_output" \
              | sed -nE 's#.*https://github.com/[^/]+/[^/]+/actions/runs/([0-9]+).*#\1#p' \
              | head -n 1
          )"

          for _ in {1..30}; do
            if [[ -n "$run_id" ]]; then
              break
            fi

            run_id="$(
              gh run list \
                --repo "$INFRA_REPO" \
                --workflow promote-release.yml \
                --event workflow_dispatch \
                --json databaseId,createdAt,displayTitle \
                --jq ".[] | select(.createdAt >= \"$dispatched_at\") | select(.displayTitle == \"$expected_title\") | .databaseId" \
                --limit 10 \
                | head -n 1
            )"

            if [[ -z "$run_id" ]]; then
              sleep 2
            fi
          done

          if [[ -z "$run_id" ]]; then
            echo "Could not find the dispatched staging promotion workflow run." >&2
            exit 1
          fi

          gh run watch "$run_id" \
            --repo "$INFRA_REPO" \
            --compact \
            --exit-status

  # Post-deploy verification: authenticate via the secret-guarded
  # /smoke/session endpoint and click through the deployed app so a
  # render-breaking regression turns this workflow red instead of
  # waiting for a human to stumble over it.
  verify-staging:
    name: Verify staging deploy
    needs: build-and-deploy
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: "package.json"

      - name: Install dependencies
        run: bun ci --ignore-scripts
        env:
          NPM_TOKEN: ""

      - name: Install Playwright browser
        run: cd apps/web && bunx playwright install --with-deps chromium

      - name: Run staging smoke
        run: bun --filter @stll/web test:e2e:staging
        env:
          E2E_WEB_URL: https://staging.stll.app
          E2E_API_URL: https://api-staging.stll.app
          SMOKE_SESSION_SECRET: ${{ secrets.SMOKE_SESSION_SECRET }}

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: staging-smoke-report
          path: apps/web/playwright-report/
          retention-days: 7
