name: i18n — translate

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  i18n:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        id: app-token
        with:
          app-id: ${{ secrets.LINGO_APP_ID }}
          private-key: ${{ secrets.LINGO_APP_PRIVATE_KEY }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          token: ${{ steps.app-token.outputs.token }}

      - uses: lingodotdev/lingo.dev@95e2e284805c9151c2d3691489c0528f97e72e5e # main (2026-02-19)
        with:
          api-key: ${{ secrets.LINGO_DEV_API_KEY }}
          pull-request: true
          commit-message: "feat(i18n): update translations"
          pull-request-title: "feat(i18n): update translations"
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
