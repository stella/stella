name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  # Weekly scan to catch new vulnerability patterns
  schedule:
    - cron: "30 14 * * 4"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  analyze:
    # Keep the workflow wired up, but skip the job entirely while the
    # repository is private so we do not burn runner minutes on setup.
    # Once the repo is public, set the repository variable
    # `REPO_IS_PUBLIC=true` to re-enable CodeQL across push, PR,
    # schedule, and manual runs.
    if: >-
      vars.REPO_IS_PUBLIC == 'true'
      && (github.event.pull_request.draft != true || github.event_name != 'pull_request')
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [javascript]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@0d579ffd059c29b07949a3cce3983f0780820c98 # v4.32.6.4.32.62.4.32.6
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@0d579ffd059c29b07949a3cce3983f0780820c98 # v4.32.6.4.32.62.4.32.6

      - name: Run CodeQL analysis
        uses: github/codeql-action/analyze@0d579ffd059c29b07949a3cce3983f0780820c98 # v4.32.6.4.32.62.4.32.6
        with:
          category: "/language:${{ matrix.language }}"
