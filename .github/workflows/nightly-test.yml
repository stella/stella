name: Nightly Full Test

on:
  schedule:
    # 04:17 UTC daily, after nightly typecheck.
    - cron: "17 4 * * *"
  workflow_dispatch:

permissions: {}

jobs:
  full-test:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
          submodules: true

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: "package.json"

      - name: Install dependencies
        run: bash scripts/bun-ci-retry.sh --ignore-scripts
        env:
          # .npmrc references NPM_TOKEN, but this workflow can be manually
          # dispatched on a branch ref. Do not expose the real token to
          # branch-controlled install scripts.
          NPM_TOKEN: ""

      - name: Prepare environment
        run: |
          cd ./apps/api
          mv .env.example .env
          cd ../web
          mv .env.example .env

      - name: Full test suite
        run: bun run test -- --concurrency=2
        env:
          TURBO_FORCE: "true"
