name: Model Catalog Upstream Check

# Providers retire and rename models on their own schedules. This
# nightly job compares stella's picker (@stll/ai-catalog) bidirectionally
# with live, public, keyless listings (OpenRouter + models.dev). It fails
# when an eligible new model has no reviewed disposition, or when an offered
# model is deprecated or gone upstream.

on:
  schedule:
    # 04:37 UTC daily (off-minute to avoid the :00 stampede)
    - cron: "37 4 * * *"
  workflow_dispatch:

permissions: {}

jobs:
  model-catalog-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: "package.json"

      - name: Install dependencies
        run: bun ci --ignore-scripts
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Discover new models and validate offered IDs
        run: bun run check:model-catalog
