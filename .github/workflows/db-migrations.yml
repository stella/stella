name: Database Migrations

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - "apps/api/src/db/**"
      - "apps/api/drizzle/**"
      - "apps/api/drizzle.config.ts"
      - "scripts/check-migrations.sh"
      - ".github/workflows/db-migrations.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    if: github.event.pull_request.draft != true || github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: "package.json"

      - name: Install dependencies
        run: bun ci
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Check migration coverage
        env:
          BASE_REF: ${{ github.event_name == 'pull_request' && format('origin/{0}', github.base_ref) || 'HEAD^' }}
        run: bash scripts/check-migrations.sh
