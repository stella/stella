name: Database Migrations

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - "apps/api/src/db/**"
      - "apps/api/src/index.ts"
      - "apps/api/src/lib/db/**"
      - "apps/api/drizzle/**"
      - "apps/api/drizzle.config.ts"
      - "scripts/check-migration-safety.ts"
      - "scripts/check-migrations.sh"
      - ".github/workflows/db-migrations.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  check:
    if: github.event.pull_request.draft != true || github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: "package.json"

      - name: Install dependencies
        run: bun ci
        env:
          # .npmrc references NPM_TOKEN, but PR installs must not expose
          # the real npm token to dependency lifecycle scripts.
          NPM_TOKEN: ""

      - name: Check migration coverage
        env:
          BASE_REF: ${{ github.event_name == 'pull_request' && format('origin/{0}', github.base_ref) || 'HEAD^' }}
        run: bash scripts/check-migrations.sh

  apply-fresh:
    # Validates that `drizzle-kit migrate` can apply every migration end-to-end
    # against an empty Postgres. Catches: missing `_journal.json`, ordering bugs,
    # syntax errors, and any migration that would crash on a real DB.
    if: github.event.pull_request.draft != true || github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    services:
      postgres:
        image: postgres:18.3
        env:
          POSTGRES_USER: stella
          POSTGRES_PASSWORD: stella
          POSTGRES_DB: stella
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U stella -d stella"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:8
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: "package.json"

      - name: Install dependencies
        run: bun ci
        env:
          # .npmrc references NPM_TOKEN, but PR installs must not expose
          # the real npm token to dependency lifecycle scripts.
          NPM_TOKEN: ""

      - name: Apply all migrations to fresh Postgres
        working-directory: apps/api
        env:
          DATABASE_URL: postgres://stella:stella@127.0.0.1:5432/stella
        run: bun --bun drizzle-kit migrate

      - name: Verify schema parity with schema.ts
        working-directory: apps/api
        env:
          DATABASE_URL: postgres://stella:stella@127.0.0.1:5432/stella
        # `push --explain` exits with "[i] No changes detected" when the
        # migrated schema already matches schema.ts. Any pending diff fails CI.
        run: |
          OUT=$(bun --bun drizzle-kit push --explain 2>&1)
          echo "$OUT"
          echo "$OUT" | grep -q "No changes detected" || {
            echo "::error::Migrated schema does not match schema.ts. Either commit a generated migration that closes the gap, or fix the migration files."
            exit 1
          }

      - name: Verify __drizzle_migrations recorded all migrations
        env:
          PGPASSWORD: stella
        run: |
          set -euo pipefail
          EXPECTED=$(find apps/api/drizzle -mindepth 1 -maxdepth 1 -type d -name '20*' | wc -l | tr -d ' ')
          APPLIED=$(psql -h 127.0.0.1 -U stella -d stella -tAc "SELECT count(*) FROM drizzle.__drizzle_migrations")
          echo "Expected $EXPECTED migrations, drizzle.__drizzle_migrations has $APPLIED"
          [ "$EXPECTED" = "$APPLIED" ] || {
            echo "::error::Migration count mismatch: $APPLIED applied, $EXPECTED on disk."
            exit 1
          }

      - name: Verify API boots with migration check enabled
        working-directory: apps/api
        env:
          BETTER_AUTH_SECRET: "migration-smoke-secret-at-least-32-chars"
          BETTER_AUTH_URL: "http://127.0.0.1:3001"
          DATABASE_URL: postgres://stella:stella@127.0.0.1:5432/stella
          EMAIL_PROVIDER: smtp
          FRONTEND_URL: "http://127.0.0.1:3000"
          GOTENBERG_PASSWORD: gotenberg
          GOTENBERG_URL: "http://127.0.0.1:3000"
          GOTENBERG_USERNAME: gotenberg
          REDIS_URL: "redis://127.0.0.1:6379"
          S3_BUCKET: stella
          S3_CREDENTIALS_PROVIDER: none
          S3_ENDPOINT: "http://127.0.0.1:9000"
          S3_REGION: us-east-1
          SMTP_HOST: "127.0.0.1"
          SMTP_PORT: "1025"
          TRANSACTIONAL_EMAIL_FROM: "noreply@example.com"
          USE_MOCK_AI: "true"
        run: |
          set -euo pipefail
          log_file="$RUNNER_TEMP/stella-api-smoke.log"
          bun src/index.ts >"$log_file" 2>&1 &
          api_pid=$!

          # shellcheck disable=SC2329
          cleanup() {
            kill "$api_pid" >/dev/null 2>&1 || true
            wait "$api_pid" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          for _ in {1..60}; do
            if curl -fsS http://127.0.0.1:3001/health >/dev/null; then
              exit 0
            fi
            if ! kill -0 "$api_pid" >/dev/null 2>&1; then
              cat "$log_file"
              exit 1
            fi
            sleep 1
          done

          cat "$log_file"
          exit 1
