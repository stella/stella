name: Container Image Scan

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - "apps/api/Dockerfile"
  push:
    branches: [main]
    paths:
      - "apps/api/Dockerfile"
  schedule:
    # Weekly scan to catch newly disclosed CVEs
    - cron: "0 8 * * 1"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  trivy:
    if: github.event.pull_request.draft != true || github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build image
        run: |
          docker build \
            -f apps/api/Dockerfile \
            -t stella-api:scan \
            .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: "stella-api:scan"
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"
          # Fail on scheduled scans (alert on new CVEs) but not
          # on PRs where base-image CVEs are outside author control.
          exit-code: ${{ github.event_name == 'schedule' && '1' || '0' }}

      # TODO: remove visibility guard once the repo is public
      # (upload-sarif requires GitHub Advanced Security).
      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@0d579ffd059c29b07949a3cce3983f0780820c98 # v4.32.6
        if: always() && github.repository_visibility == 'public'
        with:
          sarif_file: "trivy-results.sarif"
