name: AI provider canary

on:
  schedule:
    # The weekly tier is a superset of the daily tier, so it replaces Monday's
    # daily run instead of duplicating the same provider calls. GitHub Actions
    # day-of-week accepts 0-6 (0 = Sunday); Tuesday-Sunday is "0,2-6".
    - cron: "17 3 * * 0,2-6"
    - cron: "17 3 * * 1"
  workflow_dispatch:
    inputs:
      provider:
        description: Provider to probe
        required: true
        default: all
        type: choice
        options:
          - all
          - google
          - openrouter
          - openai
          - anthropic
          - bedrock
          - mistral
      tier:
        description: Canary coverage tier
        required: true
        default: daily
        type: choice
        options:
          - daily
          - weekly

permissions: {}

jobs:
  provider-canary:
    name: ${{ matrix.provider }} capability contract
    runs-on: ubuntu-latest
    # Weekly serial probe timeouts total at most 410 seconds; leave room for
    # runner setup and install. Daily runs remain below the previous 10-minute budget.
    timeout-minutes: 15
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        provider: ${{ fromJSON(github.event_name == 'workflow_dispatch' && inputs.provider != 'all' && format('["{0}"]', inputs.provider) || '["google","openrouter","openai","anthropic","bedrock","mistral"]') }}
    concurrency:
      group: ai-provider-canary-${{ matrix.provider }}
      cancel-in-progress: true
    steps:
      - name: Check canary credential
        id: credential
        env:
          AI_CANARY_API_KEY: ${{ matrix.provider == 'google' && secrets.GOOGLE_GENERATIVE_AI_API_KEY || matrix.provider == 'openrouter' && secrets.OPENROUTER_API_KEY || matrix.provider == 'openai' && secrets.OPENAI_API_KEY || matrix.provider == 'anthropic' && secrets.ANTHROPIC_API_KEY || matrix.provider == 'bedrock' && secrets.BEDROCK_API_KEY || matrix.provider == 'mistral' && secrets.MISTRAL_API_KEY || '' }}
          EVENT_NAME: ${{ github.event_name }}
          PROVIDER: ${{ matrix.provider }}
        run: |
          if [[ -n "$AI_CANARY_API_KEY" ]]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            echo "::error title=Missing canary credential::No repository secret is configured for $PROVIDER."
            exit 1
          fi

          echo "configured=false" >> "$GITHUB_OUTPUT"
          echo "::notice title=Canary not configured::$PROVIDER was skipped because its repository secret is absent."

      - name: Checkout default branch
        if: steps.credential.outputs.configured == 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false

      - name: Setup Bun
        if: steps.credential.outputs.configured == 'true'
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: "package.json"

      - name: Install dependencies
        if: steps.credential.outputs.configured == 'true'
        run: bash scripts/bun-ci-retry.sh --ignore-scripts
        env:
          NPM_TOKEN: ""

      - name: Record configured provider
        if: steps.credential.outputs.configured == 'true'
        env:
          PROVIDER: ${{ matrix.provider }}
        run: |
          mkdir -p canary-ran
          touch "canary-ran/$PROVIDER"

      - name: Upload configured-provider marker
        if: steps.credential.outputs.configured == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ai-provider-canary-${{ matrix.provider }}
          path: canary-ran/
          retention-days: 1

      - name: Probe provider capability contract
        if: steps.credential.outputs.configured == 'true'
        env:
          AI_CANARY_API_KEY: ${{ matrix.provider == 'google' && secrets.GOOGLE_GENERATIVE_AI_API_KEY || matrix.provider == 'openrouter' && secrets.OPENROUTER_API_KEY || matrix.provider == 'openai' && secrets.OPENAI_API_KEY || matrix.provider == 'anthropic' && secrets.ANTHROPIC_API_KEY || matrix.provider == 'bedrock' && secrets.BEDROCK_API_KEY || matrix.provider == 'mistral' && secrets.MISTRAL_API_KEY || '' }}
          CANARY_TIER: ${{ github.event_name == 'workflow_dispatch' && inputs.tier || github.event.schedule == '17 3 * * 1' && 'weekly' || 'daily' }}
          USE_MOCK_AI: "false"
        run: >-
          bun run canary:ai-provider --
          --provider "${{ matrix.provider }}"
          --tier "$CANARY_TIER"

  require-provider-coverage:
    name: Require selected provider coverage
    if: always()
    needs: provider-canary
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      contents: read
    steps:
      - name: Checkout default branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: "package.json"

      - name: Install dependencies
        run: bash scripts/bun-ci-retry.sh --ignore-scripts
        env:
          NPM_TOKEN: ""

      - name: Download configured-provider markers
        id: download
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: ai-provider-canary-*
          path: canary-ran
          merge-multiple: true

      - name: Require selected provider coverage
        env:
          DOWNLOAD_OUTCOME: ${{ steps.download.outcome }}
          PROVIDER_SELECTION: ${{ github.event_name == 'workflow_dispatch' && inputs.provider || 'all' }}
        run: >-
          bun apps/api/scripts/ai-provider-canary-coverage.ts
          --provider "$PROVIDER_SELECTION"
          --download-outcome "$DOWNLOAD_OUTCOME"
