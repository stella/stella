name: Release Artifacts

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_ref:
        description: "Git tag to publish, for example v1.2.3 or v1.2.3-rc.1"
        required: true
        type: string

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/stella-api

jobs:
  resolve:
    name: Resolve trusted release
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      release_ref: ${{ steps.release.outputs.ref }}
      release_sha: ${{ steps.release.outputs.sha }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Resolve release tag
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          RELEASE_INPUT: ${{ github.event_name == 'workflow_dispatch' && inputs.release_ref || github.ref_name }}
        run: |
          release_ref="$RELEASE_INPUT"
          # Pattern must stay aligned with scripts/release-channel.sh
          # and .github/workflows/release-desktop.yml — all three gate
          # on the same shape so a tag accepted by one is accepted by
          # all. The prerelease channel is whitelisted to
          # rc|beta|alpha so a `v1.2.3-prod.1` mistag can't overwrite
          # the stable manifest in S3.
          if [[ ! "$release_ref" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-(rc|beta|alpha)\.[0-9]+)?$ ]]; then
            echo "::error::Release ref must look like v1.2.3, v1.2.3-rc.1, v1.2.3-beta.1, or v1.2.3-alpha.1"
            exit 1
          fi

          tag_ref_json=$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${release_ref}" 2>/dev/null) || {
            echo "::error::Tag ${release_ref} does not exist"
            exit 1
          }
          tag_object_type=$(echo "$tag_ref_json" | jq -r '.object.type')
          tag_object_sha=$(echo "$tag_ref_json" | jq -r '.object.sha')
          if [[ "$tag_object_type" == "tag" ]]; then
            release_sha=$(gh api "repos/${GITHUB_REPOSITORY}/git/tags/${tag_object_sha}" --jq '.object.sha')
          else
            release_sha="$tag_object_sha"
          fi
          if [[ ! "$release_sha" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::Could not resolve $release_ref to a commit SHA"
            exit 1
          fi

          {
            echo "ref=$release_ref"
            echo "sha=$release_sha"
            echo "version=${release_ref#v}"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout resolved commit
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ steps.release.outputs.sha }}
          fetch-depth: 0

      - name: Verify release source
        env:
          RELEASE_REF: ${{ steps.release.outputs.ref }}
          RELEASE_SHA: ${{ steps.release.outputs.sha }}
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          git fetch --no-tags origin main:refs/remotes/origin/main
          if ! git merge-base --is-ancestor "$RELEASE_SHA" origin/main; then
            echo "::error::Release tag $RELEASE_REF is not reachable from protected main"
            exit 1
          fi

          file_version="$(tr -d '[:space:]' < VERSION)"
          if [[ "$file_version" != "$VERSION" ]]; then
            echo "::error::VERSION ($file_version) does not match $RELEASE_REF"
            exit 1
          fi

  smoke:
    name: Build and smoke test API image
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 20
    needs: resolve
    permissions:
      contents: read

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: stella
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:8
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.resolve.outputs.release_sha }}

      - name: Build smoke image
        run: docker build -f apps/api/Dockerfile -t stella-api:smoke .

      - name: Run smoke container
        env:
          BETTER_AUTH_SECRET: "release-smoke-secret-at-least-32-chars"
          BETTER_AUTH_URL: "http://localhost:3001"
          DATABASE_URL: "postgres://postgres:postgres@127.0.0.1:5432/stella"
          EMAIL_PROVIDER: "smtp"
          FRONTEND_URL: "http://localhost:3000"
          GOOGLE_GENERATIVE_AI_API_KEY: "release-smoke"
          GOTENBERG_PASSWORD: "gotenberg"
          GOTENBERG_URL: "http://127.0.0.1:3000"
          GOTENBERG_USERNAME: "gotenberg"
          POSTHOG_HOST: "https://eu.i.posthog.com"
          POSTHOG_KEY: "phc_"
          REDIS_URL: "redis://127.0.0.1:6379"
          S3_BUCKET: "stella"
          S3_ENDPOINT: "http://127.0.0.1:9000"
          S3_REGION: "us-east-1"
          SMTP_HOST: "127.0.0.1"
          SMTP_PORT: "1025"
          TRANSACTIONAL_EMAIL_FROM: "noreply@example.com"
          USE_MOCK_AI: "true"
          # Smoke test only verifies the binary boots; the database
          # is empty so the startup migration-hash check would
          # fail-closed and abort the build. Skip it here — the
          # check stays active in real deploys via the production
          # task definition env.
          SKIP_MIGRATION_CHECK: "true"
        run: |
          cleanup_smoke() {
            docker rm -f stella-api-smoke >/dev/null 2>&1 || true
          }
          trap cleanup_smoke EXIT
          cleanup_smoke

          docker run --detach --network host \
            --name stella-api-smoke \
            --env BETTER_AUTH_SECRET \
            --env BETTER_AUTH_URL \
            --env DATABASE_URL \
            --env EMAIL_PROVIDER \
            --env FRONTEND_URL \
            --env GOOGLE_GENERATIVE_AI_API_KEY \
            --env GOTENBERG_PASSWORD \
            --env GOTENBERG_URL \
            --env GOTENBERG_USERNAME \
            --env POSTHOG_HOST \
            --env POSTHOG_KEY \
            --env REDIS_URL \
            --env S3_BUCKET \
            --env S3_ENDPOINT \
            --env S3_REGION \
            --env SMTP_HOST \
            --env SMTP_PORT \
            --env TRANSACTIONAL_EMAIL_FROM \
            --env USE_MOCK_AI \
            --env SKIP_MIGRATION_CHECK \
            stella-api:smoke

          for _ in {1..60}; do
            if curl -fsS http://127.0.0.1:3001/health >/dev/null; then
              exit 0
            fi
            if [[ "$(docker inspect --format='{{.State.Running}}' stella-api-smoke 2>/dev/null)" != "true" ]]; then
              docker logs stella-api-smoke || true
              exit 1
            fi
            sleep 2
          done

          docker logs stella-api-smoke || true
          exit 1

  build-arm64:
    name: Build API image (linux/arm64)
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30
    needs: resolve
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write

    outputs:
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.resolve.outputs.release_sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: apps/api/Dockerfile
          platforms: linux/arm64
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache-arm64
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache-arm64,mode=max
          build-args: |
            STELLA_VERSION=${{ needs.resolve.outputs.version }}

      - name: Attest image provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

  build-amd64:
    name: Build API image (linux/amd64)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: resolve
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write

    outputs:
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.resolve.outputs.release_sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: apps/api/Dockerfile
          platforms: linux/amd64
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache-amd64
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache-amd64,mode=max
          build-args: |
            STELLA_VERSION=${{ needs.resolve.outputs.version }}

      - name: Attest image provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

  manifest:
    name: Assemble multi-arch manifest and GitHub release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [resolve, build-arm64, build-amd64, smoke]
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.resolve.outputs.release_sha }}
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifest list
        id: manifest
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          RELEASE_REF: ${{ needs.resolve.outputs.release_ref }}
          ARM64_DIGEST: ${{ needs.build-arm64.outputs.digest }}
          AMD64_DIGEST: ${{ needs.build-amd64.outputs.digest }}
          SHA: ${{ needs.resolve.outputs.release_sha }}
        run: |
          docker buildx imagetools create \
            -t "${IMAGE}:${RELEASE_REF}" \
            -t "${IMAGE}:sha-${SHA:0:7}" \
            "${IMAGE}@${ARM64_DIGEST}" \
            "${IMAGE}@${AMD64_DIGEST}"

          digest="$(docker buildx imagetools inspect "${IMAGE}:${RELEASE_REF}" --format '{{.Manifest.Digest}}')"
          echo "digest=${digest}" >> "$GITHUB_OUTPUT"

      - name: Create release manifest
        env:
          IMAGE_DIGEST: ${{ steps.manifest.outputs.digest }}
          IMAGE_NAME: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          RELEASE_REF: ${{ needs.resolve.outputs.release_ref }}
        run: |
          bash scripts/create-release-manifest.sh \
            "$RELEASE_REF" \
            "$IMAGE_NAME" \
            "$IMAGE_DIGEST" \
            > release-manifest.json

      - name: Upload manifest artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-manifest-${{ needs.resolve.outputs.release_ref }}
          path: release-manifest.json
          retention-days: 90

      - name: Generate release notes from Conventional Commits
        uses: orhun/git-cliff-action@f50e11560dce63f7c33227798f90b924471a88b5 # v4.8.0
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: NOTES.md

      - name: Publish GitHub release manifest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_REF: ${{ needs.resolve.outputs.release_ref }}
        run: |
          if ! gh release view "$RELEASE_REF" >/dev/null 2>&1; then
            extra_args=()
            if [[ "$RELEASE_REF" == *-rc.* ]]; then
              extra_args+=(--prerelease)
            else
              # Defer the "latest" flag until release-desktop.yml has
              # uploaded the signed installers. Without this, GitHub
              # auto-promotes the new stable release on creation, but
              # the desktop build runs as a workflow_run trigger and
              # takes another ~25 min — during that window
              # /releases/latest/download/Stella-macos-universal.dmg
              # 404s for end users. release-desktop.yml flips the
              # flag in its final step, after both Mac + Windows
              # signed installers are attached to the release.
              extra_args+=(--latest=false)
            fi
            gh release create "$RELEASE_REF" \
              --title "$RELEASE_REF" \
              --notes-file NOTES.md \
              --verify-tag \
              "${extra_args[@]}"
          fi
          gh release upload "$RELEASE_REF" release-manifest.json --clobber

  promote:
    # Auto-promote stable releases (vX.Y.Z) to production. Any tag
    # carrying a prerelease label (vX.Y.Z-anything) publishes the
    # artifact and is handled by `promote-staging` below.
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [resolve, manifest, smoke]
    if: ${{ !contains(needs.resolve.outputs.release_ref, '-') }}
    permissions:
      contents: read
    steps:
      - name: Mint App token for the infra repo
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          app-id: ${{ secrets.STELLA_RELEASE_APP_ID }}
          private-key: ${{ secrets.STELLA_RELEASE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: stella-infra

      - name: Dispatch and watch promote-release.yml
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          RELEASE_REF: ${{ needs.resolve.outputs.release_ref }}
          TARGET_ENV: production
          INFRA_REPO: ${{ github.repository_owner }}/stella-infra
        run: |
          dispatched_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          # Must match the `run-name:` template in
          # stella-infra/.github/workflows/promote-release.yml
          expected_title="Promote ${RELEASE_REF} → ${TARGET_ENV}"
          dispatch_output="$(
            gh workflow run promote-release.yml \
              --repo "$INFRA_REPO" \
              --field release_ref="$RELEASE_REF" \
              --field target_environment="$TARGET_ENV" \
              --field run_migrations=true \
              --field frontend=true 2>&1
          )"
          printf '%s\n' "$dispatch_output"

          run_id="$(
            printf '%s\n' "$dispatch_output" \
              | sed -nE 's#.*https://github.com/[^/]+/[^/]+/actions/runs/([0-9]+).*#\1#p' \
              | head -n 1
          )"

          for _ in {1..30}; do
            if [[ -n "$run_id" ]]; then
              break
            fi

            # Match by exact displayTitle so concurrent dispatches
            # cannot be confused, and prefix-overlapping refs
            # (v1.2.3 vs v1.2.3-rc.1, v1.2.3-rc.1 vs v1.2.3-rc.10)
            # never collide.
            run_id="$(
              gh run list \
                --repo "$INFRA_REPO" \
                --workflow promote-release.yml \
                --event workflow_dispatch \
                --json databaseId,createdAt,displayTitle \
                --jq ".[] | select(.createdAt >= \"$dispatched_at\") | select(.displayTitle == \"$expected_title\") | .databaseId" \
                --limit 10 \
                | head -n 1
            )"

            if [[ -z "$run_id" ]]; then
              sleep 2
            fi
          done

          if [[ -z "$run_id" ]]; then
            echo "Could not find the dispatched promotion workflow run." >&2
            exit 1
          fi

          gh run watch "$run_id" \
            --repo "$INFRA_REPO" \
            --compact \
            --exit-status

  promote-staging:
    # Auto-promote release-candidate tags (vX.Y.Z-rc.N) to staging.
    # Same dispatch pattern as `promote` above; the infra workflow
    # reads target_environment to resolve the staging-scoped vars
    # and apply role.
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [resolve, manifest, smoke]
    if: ${{ contains(needs.resolve.outputs.release_ref, '-rc.') }}
    permissions:
      contents: read
    steps:
      - name: Mint App token for the infra repo
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          app-id: ${{ secrets.STELLA_RELEASE_APP_ID }}
          private-key: ${{ secrets.STELLA_RELEASE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: stella-infra

      - name: Dispatch and watch promote-release.yml (staging)
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          RELEASE_REF: ${{ needs.resolve.outputs.release_ref }}
          TARGET_ENV: staging
          INFRA_REPO: ${{ github.repository_owner }}/stella-infra
        run: |
          dispatched_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          # Must match the `run-name:` template in
          # stella-infra/.github/workflows/promote-release.yml
          expected_title="Promote ${RELEASE_REF} → ${TARGET_ENV}"
          dispatch_output="$(
            gh workflow run promote-release.yml \
              --repo "$INFRA_REPO" \
              --field release_ref="$RELEASE_REF" \
              --field target_environment="$TARGET_ENV" \
              --field run_migrations=true \
              --field frontend=true 2>&1
          )"
          printf '%s\n' "$dispatch_output"

          run_id="$(
            printf '%s\n' "$dispatch_output" \
              | sed -nE 's#.*https://github.com/[^/]+/[^/]+/actions/runs/([0-9]+).*#\1#p' \
              | head -n 1
          )"

          for _ in {1..30}; do
            if [[ -n "$run_id" ]]; then
              break
            fi

            # Match by exact displayTitle so concurrent dispatches
            # cannot be confused, and prefix-overlapping refs
            # (v1.2.3 vs v1.2.3-rc.1, v1.2.3-rc.1 vs v1.2.3-rc.10)
            # never collide.
            run_id="$(
              gh run list \
                --repo "$INFRA_REPO" \
                --workflow promote-release.yml \
                --event workflow_dispatch \
                --json databaseId,createdAt,displayTitle \
                --jq ".[] | select(.createdAt >= \"$dispatched_at\") | select(.displayTitle == \"$expected_title\") | .databaseId" \
                --limit 10 \
                | head -n 1
            )"

            if [[ -z "$run_id" ]]; then
              sleep 2
            fi
          done

          if [[ -z "$run_id" ]]; then
            echo "Could not find the dispatched promotion workflow run." >&2
            exit 1
          fi

          gh run watch "$run_id" \
            --repo "$INFRA_REPO" \
            --compact \
            --exit-status
