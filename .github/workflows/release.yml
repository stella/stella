name: Release Artifacts

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_ref:
        description: "Git tag to publish, for example v1.2.3 or v1.2.3-rc.1"
        required: true
        type: string

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/stella-api

jobs:
  resolve:
    name: Resolve trusted release
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      release_ref: ${{ steps.release.outputs.ref }}
      release_sha: ${{ steps.release.outputs.sha }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Resolve release tag
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          RELEASE_INPUT: ${{ github.event_name == 'workflow_dispatch' && inputs.release_ref || github.ref_name }}
        run: |
          release_ref="$RELEASE_INPUT"
          # Pattern must stay aligned with scripts/release-channel.sh
          # and .github/workflows/release-desktop.yml — all three gate
          # on the same shape so a tag accepted by one is accepted by
          # all. The prerelease channel is whitelisted to
          # rc|beta|alpha so a `v1.2.3-prod.1` mistag can't overwrite
          # the stable manifest in S3.
          if [[ ! "$release_ref" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-(rc|beta|alpha)\.[0-9]+)?$ ]]; then
            echo "::error::Release ref must look like v1.2.3, v1.2.3-rc.1, v1.2.3-beta.1, or v1.2.3-alpha.1"
            exit 1
          fi

          tag_ref_json=$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${release_ref}" 2>/dev/null) || {
            echo "::error::Tag ${release_ref} does not exist"
            exit 1
          }
          tag_object_type=$(echo "$tag_ref_json" | jq -r '.object.type')
          tag_object_sha=$(echo "$tag_ref_json" | jq -r '.object.sha')
          if [[ "$tag_object_type" == "tag" ]]; then
            release_sha=$(gh api "repos/${GITHUB_REPOSITORY}/git/tags/${tag_object_sha}" --jq '.object.sha')
          else
            release_sha="$tag_object_sha"
          fi
          if [[ ! "$release_sha" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::Could not resolve $release_ref to a commit SHA"
            exit 1
          fi

          {
            echo "ref=$release_ref"
            echo "sha=$release_sha"
            echo "version=${release_ref#v}"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout resolved commit
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ steps.release.outputs.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Verify release source
        env:
          RELEASE_REF: ${{ steps.release.outputs.ref }}
          RELEASE_SHA: ${{ steps.release.outputs.sha }}
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          git fetch --no-tags origin main:refs/remotes/origin/main
          if ! git merge-base --is-ancestor "$RELEASE_SHA" origin/main; then
            echo "::error::Release tag $RELEASE_REF is not reachable from protected main"
            exit 1
          fi

          file_version="$(tr -d '[:space:]' < VERSION)"
          if [[ "$file_version" != "$VERSION" ]]; then
            echo "::error::VERSION ($file_version) does not match $RELEASE_REF"
            exit 1
          fi

  smoke:
    name: Build and smoke test API image
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 20
    needs: resolve
    permissions:
      contents: read

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: stella
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:8
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.resolve.outputs.release_sha }}
          persist-credentials: false

      - name: Build smoke image
        run: docker build -f apps/api/Dockerfile -t stella-api:smoke .

      - name: Prepare smoke database
        env:
          PGPASSWORD: postgres
        run: |
          docker run --rm --network host \
            --env PGPASSWORD \
            --volume "$PWD/docker/postgres/init.sql:/init.sql:ro" \
            postgres:18 \
            psql -h 127.0.0.1 -U postgres -d stella -f /init.sql

      - name: Apply smoke migrations
        env:
          DATABASE_URL: "postgres://postgres:postgres@127.0.0.1:5432/stella"
        run: |
          docker run --rm --network host \
            --env DATABASE_URL \
            stella-api:smoke \
            bun --bun drizzle-kit migrate

      - name: Run smoke container
        env:
          BETTER_AUTH_SECRET: "release-smoke-secret-at-least-32-chars"
          BETTER_AUTH_URL: "http://localhost:3001"
          DATABASE_URL: "postgres://postgres:postgres@127.0.0.1:5432/stella"
          EMAIL_PROVIDER: "smtp"
          FRONTEND_URL: "http://localhost:3000"
          GOOGLE_GENERATIVE_AI_API_KEY: "release-smoke"
          GOTENBERG_PASSWORD: "gotenberg"
          GOTENBERG_URL: "http://127.0.0.1:3000"
          GOTENBERG_USERNAME: "gotenberg"
          POSTHOG_HOST: "https://eu.i.posthog.com"
          POSTHOG_KEY: "phc_"
          REDIS_URL: "redis://127.0.0.1:6379"
          S3_BUCKET: "stella"
          S3_ENDPOINT: "http://127.0.0.1:9000"
          S3_REGION: "us-east-1"
          SMTP_HOST: "127.0.0.1"
          SMTP_PORT: "1025"
          TRANSACTIONAL_EMAIL_FROM: "noreply@example.com"
          USE_MOCK_AI: "true"
        run: |
          cleanup_smoke() {
            docker rm -f stella-api-smoke >/dev/null 2>&1 || true
          }
          trap cleanup_smoke EXIT
          cleanup_smoke

          # Satisfies the staging/production boot guard in
          # apps/api/src/env.ts; the smoke never persists data.
          CONTENT_ENCRYPTION_KEY="$(openssl rand -hex 32)"
          export CONTENT_ENCRYPTION_KEY

          docker run --detach --network host \
            --name stella-api-smoke \
            --env BETTER_AUTH_SECRET \
            --env BETTER_AUTH_URL \
            --env CONTENT_ENCRYPTION_KEY \
            --env DATABASE_URL \
            --env EMAIL_PROVIDER \
            --env FRONTEND_URL \
            --env GOOGLE_GENERATIVE_AI_API_KEY \
            --env GOTENBERG_PASSWORD \
            --env GOTENBERG_URL \
            --env GOTENBERG_USERNAME \
            --env POSTHOG_HOST \
            --env POSTHOG_KEY \
            --env REDIS_URL \
            --env S3_BUCKET \
            --env S3_ENDPOINT \
            --env S3_REGION \
            --env SMTP_HOST \
            --env SMTP_PORT \
            --env TRANSACTIONAL_EMAIL_FROM \
            --env USE_MOCK_AI \
            stella-api:smoke

          for _ in {1..60}; do
            if curl -fsS http://127.0.0.1:3001/health >/dev/null; then
              exit 0
            fi
            if [[ "$(docker inspect --format='{{.State.Running}}' stella-api-smoke 2>/dev/null)" != "true" ]]; then
              docker logs stella-api-smoke || true
              exit 1
            fi
            sleep 2
          done

          docker logs stella-api-smoke || true
          exit 1

  build-arm64:
    name: Build API image (linux/arm64)
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30
    needs: resolve
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      artifact-metadata: write

    outputs:
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.resolve.outputs.release_sha }}
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Login to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: apps/api/Dockerfile
          platforms: linux/arm64
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache-arm64
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache-arm64,mode=max
          build-args: |
            STELLA_VERSION=${{ needs.resolve.outputs.version }}
            STELLA_COMMIT_SHA=${{ needs.resolve.outputs.release_sha }}

      - name: Attest image provenance
        uses: ./.github/actions/provenance
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}

  build-amd64:
    name: Build API image (linux/amd64)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: resolve
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      artifact-metadata: write

    outputs:
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.resolve.outputs.release_sha }}
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Login to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: apps/api/Dockerfile
          platforms: linux/amd64
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache-amd64
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache-amd64,mode=max
          build-args: |
            STELLA_VERSION=${{ needs.resolve.outputs.version }}
            STELLA_COMMIT_SHA=${{ needs.resolve.outputs.release_sha }}

      - name: Attest image provenance
        uses: ./.github/actions/provenance
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}

  manifest:
    name: Assemble multi-arch manifest and GitHub release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [resolve, build-arm64, build-amd64, smoke]
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write
      artifact-metadata: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.resolve.outputs.release_sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Login to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifest list
        id: manifest
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          RELEASE_REF: ${{ needs.resolve.outputs.release_ref }}
          ARM64_DIGEST: ${{ needs.build-arm64.outputs.digest }}
          AMD64_DIGEST: ${{ needs.build-amd64.outputs.digest }}
          SHA: ${{ needs.resolve.outputs.release_sha }}
        run: |
          docker buildx imagetools create \
            -t "${IMAGE}:${RELEASE_REF}" \
            -t "${IMAGE}:sha-${SHA:0:7}" \
            "${IMAGE}@${ARM64_DIGEST}" \
            "${IMAGE}@${AMD64_DIGEST}"

          digest="$(docker buildx imagetools inspect "${IMAGE}:${RELEASE_REF}" --format '{{.Manifest.Digest}}')"
          echo "digest=${digest}" >> "$GITHUB_OUTPUT"

      - name: Attest release image index provenance
        uses: ./.github/actions/provenance
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.manifest.outputs.digest }}

      - name: Create release manifest
        env:
          IMAGE_DIGEST: ${{ steps.manifest.outputs.digest }}
          IMAGE_NAME: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          RELEASE_REF: ${{ needs.resolve.outputs.release_ref }}
        run: |
          bash scripts/create-release-manifest.sh \
            "$RELEASE_REF" \
            "$IMAGE_NAME" \
            "$IMAGE_DIGEST" \
            > release-manifest.json

      - name: Upload manifest artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-manifest-${{ needs.resolve.outputs.release_ref }}
          path: release-manifest.json
          retention-days: 90

      - name: Resolve release notes range
        id: release-notes-range
        env:
          RELEASE_REF: ${{ needs.resolve.outputs.release_ref }}
        run: |
          if [[ "$RELEASE_REF" == *-* ]]; then
            echo "args=--latest --strip header" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          previous_stable="$(
            git tag --list 'v[0-9]*.[0-9]*.[0-9]*' \
              --merged "$RELEASE_REF" \
              --sort=-v:refname \
              | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
              | grep -v -x "$RELEASE_REF" \
              | head -n 1
          )"

          if [[ -z "$previous_stable" ]]; then
            first_commit="$(git rev-list --max-parents=0 "$RELEASE_REF" | tail -n 1)"
            echo "args=--tag ${RELEASE_REF} --strip header ${first_commit}..${RELEASE_REF}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "args=--tag ${RELEASE_REF} --strip header ${previous_stable}..${RELEASE_REF}" >> "$GITHUB_OUTPUT"

      - name: Generate release notes from Conventional Commits
        uses: orhun/git-cliff-action@f50e11560dce63f7c33227798f90b924471a88b5 # v4.8.0
        with:
          config: cliff.toml
          args: ${{ steps.release-notes-range.outputs.args }}
        env:
          OUTPUT: NOTES.md

      - name: Prepend manual release description
        env:
          RELEASE_REF: ${{ needs.resolve.outputs.release_ref }}
        run: |
          manual_notes="docs/changelog/${RELEASE_REF}.md"
          if [[ ! -f "$manual_notes" ]]; then
            exit 0
          fi

          {
            cat "$manual_notes"
            printf '\n\n## Changes\n\n'
            cat NOTES.md
          } > NOTES.with-manual.md
          mv NOTES.with-manual.md NOTES.md

      - name: Publish GitHub release manifest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_REF: ${{ needs.resolve.outputs.release_ref }}
        run: |
          if ! gh release view "$RELEASE_REF" >/dev/null 2>&1; then
            extra_args=()
            if [[ "$RELEASE_REF" == *-* ]]; then
              extra_args+=(--prerelease)
            else
              # Defer the "latest" flag until release-desktop.yml has
              # uploaded the signed installers. Without this, GitHub
              # auto-promotes the new stable release on creation, but
              # the desktop build runs as a workflow_run trigger and
              # takes another ~25 min — during that window
              # /releases/latest/download/Stella-macos-universal.dmg
              # 404s for end users. release-desktop.yml flips the
              # flag in its final step, after both Mac + Windows
              # signed installers are attached to the release.
              extra_args+=(--latest=false)
            fi
            gh release create "$RELEASE_REF" \
              --title "$RELEASE_REF" \
              --notes-file NOTES.md \
              --verify-tag \
              "${extra_args[@]}"
          fi
          gh release upload "$RELEASE_REF" release-manifest.json --clobber

  promote:
    # Auto-promote stable releases (vX.Y.Z) to production. Any tag
    # carrying a prerelease label (vX.Y.Z-anything) publishes the
    # artifact and is handled by `promote-staging` below.
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [resolve, manifest, smoke]
    if: ${{ !contains(needs.resolve.outputs.release_ref, '-') }}
    permissions:
      contents: read
    steps:
      - name: Mint App token for the infra repo
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.STELLA_RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.STELLA_RELEASE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: stella-infra
          permission-actions: write

      - name: Dispatch and watch promote-release.yml
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          RELEASE_REF: ${{ needs.resolve.outputs.release_ref }}
          TARGET_ENV: production
          INFRA_REPO: ${{ github.repository_owner }}/stella-infra
        run: |
          set -euo pipefail
          dispatched_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          # Must match the `run-name:` template in
          # stella-infra/.github/workflows/promote-release.yml
          expected_title="Promote ${RELEASE_REF} → ${TARGET_ENV}"

          # Use the dispatches REST endpoint directly. `gh workflow
          # run` first looks up the workflow by filename and the
          # repo's default branch; with the narrowly-scoped App
          # token (permission-actions: write only, no contents/
          # metadata) those implicit lookups can fail silently and
          # kill the step in well under a second with no output.
          # Calling /dispatches directly uses exactly the
          # actions:write we have and any failure surfaces as a
          # real HTTP error in the log.
          echo "Dispatching promote-release.yml on ${INFRA_REPO} (target=${TARGET_ENV}, release=${RELEASE_REF})..."
          gh api --method POST \
            "/repos/${INFRA_REPO}/actions/workflows/promote-release.yml/dispatches" \
            -f "ref=main" \
            -f "inputs[release_ref]=${RELEASE_REF}" \
            -f "inputs[target_environment]=${TARGET_ENV}" \
            -f "inputs[run_migrations]=true" \
            -f "inputs[frontend]=true"

          echo "Dispatch accepted. Polling for the new run..."
          run_id=""
          for attempt in {1..30}; do
            # Match by exact display_title so concurrent dispatches
            # cannot be confused, and prefix-overlapping refs
            # (v1.2.3 vs v1.2.3-rc.1, v1.2.3-rc.1 vs v1.2.3-rc.10)
            # never collide.
            run_id="$(
              gh api \
                "/repos/${INFRA_REPO}/actions/workflows/promote-release.yml/runs?event=workflow_dispatch&per_page=10" \
                --jq ".workflow_runs[] | select(.created_at >= \"${dispatched_at}\") | select(.display_title == \"${expected_title}\") | .id" \
                | head -n 1
            )"
            if [[ -n "$run_id" ]]; then
              echo "Found dispatched run: ${run_id} (attempt ${attempt}/30)"
              break
            fi
            sleep 2
          done

          if [[ -z "$run_id" ]]; then
            echo "::error::Dispatched a promote run but never observed it in the workflow's run list." >&2
            exit 1
          fi

          echo "Watching run ${run_id}..."
          gh run watch "$run_id" \
            --repo "$INFRA_REPO" \
            --compact \
            --exit-status

  promote-staging:
    # Auto-promote release-candidate tags (vX.Y.Z-rc.N) to staging.
    # Same dispatch pattern as `promote` above; the infra workflow
    # reads target_environment to resolve the staging-scoped vars
    # and apply role.
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [resolve, manifest, smoke]
    if: ${{ contains(needs.resolve.outputs.release_ref, '-rc.') }}
    permissions:
      contents: read
    steps:
      - name: Mint App token for the infra repo
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.STELLA_RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.STELLA_RELEASE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: stella-infra
          permission-actions: write

      - name: Dispatch and watch promote-release.yml (staging)
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          RELEASE_REF: ${{ needs.resolve.outputs.release_ref }}
          TARGET_ENV: staging
          INFRA_REPO: ${{ github.repository_owner }}/stella-infra
        run: |
          set -euo pipefail
          dispatched_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          # Must match the `run-name:` template in
          # stella-infra/.github/workflows/promote-release.yml
          expected_title="Promote ${RELEASE_REF} → ${TARGET_ENV}"

          # See the production variant above for why we call the
          # dispatches endpoint directly instead of `gh workflow run`.
          echo "Dispatching promote-release.yml on ${INFRA_REPO} (target=${TARGET_ENV}, release=${RELEASE_REF})..."
          gh api --method POST \
            "/repos/${INFRA_REPO}/actions/workflows/promote-release.yml/dispatches" \
            -f "ref=main" \
            -f "inputs[release_ref]=${RELEASE_REF}" \
            -f "inputs[target_environment]=${TARGET_ENV}" \
            -f "inputs[run_migrations]=true" \
            -f "inputs[frontend]=true"

          echo "Dispatch accepted. Polling for the new run..."
          run_id=""
          for attempt in {1..30}; do
            run_id="$(
              gh api \
                "/repos/${INFRA_REPO}/actions/workflows/promote-release.yml/runs?event=workflow_dispatch&per_page=10" \
                --jq ".workflow_runs[] | select(.created_at >= \"${dispatched_at}\") | select(.display_title == \"${expected_title}\") | .id" \
                | head -n 1
            )"
            if [[ -n "$run_id" ]]; then
              echo "Found dispatched run: ${run_id} (attempt ${attempt}/30)"
              break
            fi
            sleep 2
          done

          if [[ -z "$run_id" ]]; then
            echo "::error::Dispatched a promote run but never observed it in the workflow's run list." >&2
            exit 1
          fi

          echo "Watching run ${run_id}..."
          gh run watch "$run_id" \
            --repo "$INFRA_REPO" \
            --compact \
            --exit-status
