name: CI Checks

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, labeled]
  workflow_dispatch:

concurrency:
  # Non-run-ci label events intentionally skip below. Keep them out of
  # the main CI concurrency group so an incidental label cannot cancel
  # real checks. The ci-result job also changes its check name for
  # those events so it cannot replace the required status with a pass.
  group: >-
    ${{ github.workflow }}-${{ github.ref }}-${{
      github.event_name == 'pull_request'
      && github.event.action == 'labeled'
      && github.event.label.name != 'run-ci'
      && format('label-{0}-{1}', github.event.label.name, github.run_id)
      || 'checks'
    }}
  cancel-in-progress: true

permissions: {}

jobs:
  trust-check:
    # Skip draft PRs (CI runs when marked ready for review via
    # `reopened`). Also skip irrelevant label events: only the
    # "run-ci" label matters.
    if: >-
      github.event_name == 'workflow_dispatch'
      || (github.event.pull_request.draft != true
          && (github.event.action != 'labeled'
              || github.event.label.name == 'run-ci'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      trusted: ${{ steps.check.outputs.trusted }}
    steps:
      - name: Check if PR is trusted
        id: check
        env:
          HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          BASE_REPO: ${{ github.repository }}
          HAS_RUN_CI_LABEL: ${{ contains(github.event.pull_request.labels.*.name, 'run-ci') }}
        run: |
          # Same-repo PRs are trusted: the author has write access
          # to push branches. Fork PRs need a maintainer to add
          # the "run-ci" label after reviewing the code.
          if [[ "$HEAD_REPO" == "$BASE_REPO" ]]; then
            echo "trusted=true" >> "$GITHUB_OUTPUT"
          elif [[ "$HAS_RUN_CI_LABEL" == "true" ]]; then
            echo "trusted=true" >> "$GITHUB_OUTPUT"
          else
            echo "trusted=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Fork PR without 'run-ci' label — CI skipped. A maintainer must review the code and add the 'run-ci' label to run checks."
          fi

  ci-changes:
    needs: trust-check
    if: >-
      needs.trust-check.outputs.trusted == 'true'
      || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      desktop_rust_checks_required: ${{ steps.changed-files.outputs.desktop_rust_checks_required }}
      package_checks_required: ${{ steps.changed-files.outputs.package_checks_required }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Check changed file scope
        id: changed-files
        env:
          BASE_REF: ${{ github.base_ref || 'main' }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            echo "desktop_rust_checks_required=true" >> "$GITHUB_OUTPUT"
            echo "package_checks_required=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          base_ref="origin/$BASE_REF"
          mapfile -t changed_files < <(git diff --name-only "$base_ref"...HEAD)

          if (( ${#changed_files[@]} == 0 )); then
            echo "desktop_rust_checks_required=false" >> "$GITHUB_OUTPUT"
            echo "package_checks_required=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          desktop_rust_checks_required=$(bash scripts/detect-tauri-rust-changes.sh "${changed_files[@]}")
          package_checks_required=false
          for file in "${changed_files[@]}"; do
            case "$file" in
              .github/*|.provenance.yml|provenance/*)
                ;;
              *)
                package_checks_required=true
                ;;
            esac
            if [[ "$desktop_rust_checks_required" == "true" && "$package_checks_required" == "true" ]]; then
              break
            fi
          done

          printf 'Changed files:\n'
          printf ' - %s\n' "${changed_files[@]}"
          echo "desktop_rust_checks_required=$desktop_rust_checks_required" >> "$GITHUB_OUTPUT"
          echo "package_checks_required=$package_checks_required" >> "$GITHUB_OUTPUT"

          if [[ "$package_checks_required" != "true" ]]; then
            echo "::notice::Only workflow/provenance files changed; skipping package CI checks."
          fi

  ci-checks:
    needs: [trust-check, ci-changes]
    if: >-
      needs.trust-check.outputs.trusted == 'true'
      || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
          submodules: true

      - name: Check AI prompt sync
        if: needs.ci-changes.outputs.package_checks_required == 'true'
        run: bash scripts/sync-ai-skills.sh --check

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: "package.json"

      - name: Turbo remote cache
        if: needs.ci-changes.outputs.package_checks_required == 'true'
        uses: rharkor/caching-for-turbo@75f8ebf4a43d2c60b23bc2a27082cfea94ffdad9 # v2.5.0

      - name: Install dependencies
        if: needs.ci-changes.outputs.package_checks_required == 'true'
        run: bash scripts/bun-ci-retry.sh --ignore-scripts
        env:
          # .npmrc references NPM_TOKEN, but PR installs must not expose
          # the real npm token to dependency lifecycle scripts.
          NPM_TOKEN: ""

      - name: Workspace hygiene
        # Restored from the bun postinstall lifecycle, which is bypassed
        # by `--ignore-scripts` above. sherif catches cross-package
        # dependency drift and workspace-hygiene.ts catches misnamed
        # apps/* and packages/* directories. ci-checks is the only job
        # that needs this — its trigger (any non-workflow file changes)
        # is a superset of web-build, landing-build, db-migrations, and
        # nightly-typecheck, so coverage is identical to running it in
        # each install.
        if: needs.ci-changes.outputs.package_checks_required == 'true'
        run: bun run lint:ws

      - name: Policy evidence
        run: bun run policies:check

      - name: Railway template shape
        if: needs.ci-changes.outputs.package_checks_required == 'true'
        run: bun run check:railway-template

      - name: Prepare environment
        if: needs.ci-changes.outputs.package_checks_required == 'true'
        run: |
          cd ./apps/api
          mv .env.example .env
          cd ../web
          mv .env.example .env

      - name: Compute affected flag
        if: needs.ci-changes.outputs.package_checks_required == 'true'
        id: affected
        env:
          BASE_REF: ${{ github.base_ref || 'main' }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            echo "flag=" >> "$GITHUB_OUTPUT"
          else
            echo "flag=--affected" >> "$GITHUB_OUTPUT"
            echo "TURBO_SCM_BASE=origin/$BASE_REF" >> "$GITHUB_ENV"
          fi

      - name: Check i18n sync
        if: needs.ci-changes.outputs.package_checks_required == 'true'
        run: bun run i18n:check

      - name: Release changelog guard
        if: github.event_name == 'pull_request'
        env:
          BASE_REF: ${{ github.base_ref || 'main' }}
        run: bash scripts/check-release-changelog.sh --base "origin/$BASE_REF"

      - name: Format
        if: needs.ci-changes.outputs.package_checks_required == 'true'
        # Call turbo directly: the `format:check` script already
        # contains `-- --check`, so appending `--affected` via
        # `bun run` would land it after turbo's `--` and forward it
        # to oxfmt instead of filtering packages.
        env:
          AFFECTED_FLAG: ${{ steps.affected.outputs.flag }}
        run: |
          args=()
          [[ -z "$AFFECTED_FLAG" ]] || args+=("$AFFECTED_FLAG")
          bun --bun turbo run format "${args[@]}" -- --check

      - name: Rust format
        if: needs.ci-changes.outputs.desktop_rust_checks_required == 'true'
        run: cargo fmt --manifest-path apps/desktop/src-tauri/Cargo.toml -- --check

      - name: React Compiler bailout guard
        if: needs.ci-changes.outputs.package_checks_required == 'true'
        # Components the React Compiler bails out on (refs-in-render,
        # try/finally, an ESLint suppression on the component) are not
        # auto-memoized, so manual useMemo/useCallback there is load-bearing:
        # removing it leaves unstable references that re-fire effects every
        # render — loops that lint and typecheck do not catch. Fails when a
        # baseline bailout file loses memoization or a new bailout component
        # appears untracked. CI-only: it runs the JS compiler, too slow for the
        # local loop. Regenerate: `bun scripts/rc-bailouts.ts --write-baseline`.
        run: bun scripts/rc-bailouts.ts --check

      - name: Ratchet guard
        if: needs.ci-changes.outputs.package_checks_required == 'true'
        # Whole-repo convention metrics (see RATCHET_METRICS in
        # scripts/ratchet.ts) that may only ever
        # decrease. Each metric's current count is compared to a committed
        # baseline; a rise fails CI (a new violation), a fall just prompts a
        # `--write` to lock in the improvement. Line-based counters, no AST —
        # fast. The --self-test run first proves each counter counts what it
        # claims and that a rise regresses, so a broken guard cannot pass
        # silently. Regenerate: `bun scripts/ratchet.ts --write`.
        run: |
          bun scripts/ratchet.ts --self-test
          bun scripts/ratchet.ts --check

      - name: CLI registry snapshot guard
        if: needs.ci-changes.outputs.package_checks_required == 'true'
        # The stella CLI's committed registry snapshot, generated route map, and
        # the generated TanStack Intent agent skill must match the live MCP
        # registry: regenerate all of them and fail on any diff so a registry
        # change cannot silently ship a stale CLI surface (or stale skill docs).
        # Regenerate: `bun run codegen` in packages/cli.
        run: |
          (cd packages/cli && bun run codegen)
          git diff --exit-code -- packages/cli/src/generated packages/cli/skills

      - name: Capability catalog drift guard
        if: needs.ci-changes.outputs.package_checks_required == 'true'
        # The committed capability catalog (every `tool`/`covered` safe handler,
        # projected to id + input schema + permissions + scope + access +
        # destructive) must match the live handler graph. `--check` regenerates
        # it in-memory and byte-compares against the committed JSON, so a handler
        # or mapping-table change cannot silently ship a stale catalog.
        # Regenerate: `bun --env-file=apps/api/.env
        # apps/api/scripts/export-capability-catalog.ts`.
        run: |
          bun apps/api/scripts/export-capability-catalog.ts --check

      - name: exactMirror route guard
        if: needs.ci-changes.outputs.package_checks_required == 'true'
        # Elysia builds an "exactMirror" serializer per route schema. Some
        # schemas (recursive ones: t.Recursive, or a Type.Unsafe wrapping a
        # self-referential TypeBox node) cannot be mirrored: Elysia logs the
        # failure and falls back to slow per-request serialization, which has
        # taken the API down at boot. Typecheck and lint do not catch it. The
        # guard builds the real app and forces every route's mirror to compile,
        # failing if any cannot. The --self-test run first proves the detector
        # still catches a known recursive schema, so a broken guard cannot pass
        # silently.
        run: |
          bun apps/api/scripts/exact-mirror-guard.ts --self-test
          bun apps/api/scripts/exact-mirror-guard.ts

      - name: MCP coverage guard
        if: needs.ci-changes.outputs.package_checks_required == 'true'
        # Every safe-handler config must declare an `mcp` disposition (a
        # typecheck-enforced McpExposure). This guard imports every handler
        # module, verifies each disposition is well-formed, that every
        # tool/covered reference names a real static MCP tool, that no registry
        # tool is orphaned, and that the `pending` baseline only ever shrinks
        # (a new pending endpoint fails). The --self-test run first proves the
        # ratchet detectors still fire, so a broken guard cannot pass silently.
        run: |
          bun apps/api/scripts/mcp-coverage-guard.ts --self-test
          bun apps/api/scripts/mcp-coverage-guard.ts

      - name: Knip production dependency checks
        if: needs.ci-changes.outputs.package_checks_required == 'true'
        # Static gate paired with the image compile/boot smokes
        # (api-image-deps): knip --strict verifies production code imports
        # only `dependencies` (never a devDependency) and flags transitively
        # resolved (phantom) packages a `turbo prune` would drop. Scoped to
        # the apps that ship a pruned runtime; each declares its real
        # production entry (a `!` entry, a start script, or the SSR server
        # entry). New runtimes are enrolled here deliberately, alongside a
        # boot/compile smoke.
        run: |
          for workspace in apps/api apps/legal-atlas-runner apps/web; do
            bun run knip --production --strict --no-progress --include unlisted,unresolved --workspace "$workspace"
          done

      - name: Test
        if: needs.ci-changes.outputs.package_checks_required == 'true'
        env:
          AFFECTED_FLAG: ${{ steps.affected.outputs.flag }}
        run: |
          args=()
          [[ -z "$AFFECTED_FLAG" ]] || args+=("$AFFECTED_FLAG")
          bun run test -- --concurrency=2 "${args[@]}"

      # Self-test the bridge-version guard so a regression in the
      # script itself is caught immediately, not on the next desktop
      # bridge change. Always runs (no `if:` gate) — it's seconds
      # and has no deps.
      - name: Test bridge-version guard script
        run: bash scripts/check-bridge-version.test.sh

      # Self-test the release-channel script. The desktop release
      # pipeline relies on three independent steps deriving the
      # same channel from a tag (updater endpoint baked into the
      # binary, S3 manifest mirror path, CloudFront invalidation
      # key). A bug here makes them silently disagree.
      - name: Test release-channel script
        run: bash scripts/release-channel.test.sh

      # Self-test the desktop-release skip decision. This script
      # decides whether prod desktop users get an update at all; a
      # regression either ships stale desktop builds or reintroduces
      # pointless ~30 MB redownloads.
      - name: Test detect-desktop-release-changes script
        run: bash scripts/detect-desktop-release-changes.test.sh

      - name: Test bun ci retry script
        run: bash scripts/bun-ci-retry.test.sh

      # Fail PRs that change the desktop bridge surface without
      # bumping BRIDGE_VERSION in apps/desktop/src-tauri/src/types.rs.
      # See scripts/check-bridge-version.sh for rationale.
      - name: Bridge-version guard
        if: github.event_name == 'pull_request'
        run: bash scripts/check-bridge-version.sh

  lint:
    needs: [trust-check, ci-changes]
    if: >-
      needs.ci-changes.outputs.package_checks_required == 'true'
      && (needs.trust-check.outputs.trusted == 'true'
          || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
          submodules: true

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: "package.json"

      - name: Turbo remote cache
        uses: rharkor/caching-for-turbo@75f8ebf4a43d2c60b23bc2a27082cfea94ffdad9 # v2.5.0

      - name: Install dependencies
        run: bash scripts/bun-ci-retry.sh --ignore-scripts
        env:
          # .npmrc references NPM_TOKEN, but PR installs must not expose
          # the real npm token to dependency lifecycle scripts.
          NPM_TOKEN: ""

      - name: Compute affected flag
        id: affected
        env:
          BASE_REF: ${{ github.base_ref || 'main' }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            echo "flag=" >> "$GITHUB_OUTPUT"
          else
            echo "flag=--affected" >> "$GITHUB_OUTPUT"
            echo "TURBO_SCM_BASE=origin/$BASE_REF" >> "$GITHUB_ENV"
          fi

      - name: Lint
        env:
          AFFECTED_FLAG: ${{ steps.affected.outputs.flag }}
        run: |
          args=()
          [[ -z "$AFFECTED_FLAG" ]] || args+=("$AFFECTED_FLAG")
          bun run lint -- "${args[@]}"

  typecheck:
    needs: [trust-check, ci-changes]
    if: >-
      needs.ci-changes.outputs.package_checks_required == 'true'
      && (needs.trust-check.outputs.trusted == 'true'
          || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
          submodules: true

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: "package.json"

      - name: Turbo remote cache
        uses: rharkor/caching-for-turbo@75f8ebf4a43d2c60b23bc2a27082cfea94ffdad9 # v2.5.0

      - name: Install dependencies
        run: bash scripts/bun-ci-retry.sh --ignore-scripts
        env:
          # .npmrc references NPM_TOKEN, but PR installs must not expose
          # the real npm token to dependency lifecycle scripts.
          NPM_TOKEN: ""

      - name: Prepare environment
        run: |
          cd ./apps/api
          mv .env.example .env
          cd ../web
          mv .env.example .env

      - name: Compute affected flag
        id: affected
        env:
          BASE_REF: ${{ github.base_ref || 'main' }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            echo "flag=" >> "$GITHUB_OUTPUT"
          else
            echo "flag=--affected" >> "$GITHUB_OUTPUT"
            echo "TURBO_SCM_BASE=origin/$BASE_REF" >> "$GITHUB_ENV"
          fi

      - name: Typecheck
        env:
          AFFECTED_FLAG: ${{ steps.affected.outputs.flag }}
        run: |
          args=()
          [[ -z "$AFFECTED_FLAG" ]] || args+=("$AFFECTED_FLAG")
          bun run typecheck -- "${args[@]}"

  # Typecheck-cost baseline guard. What silently rots is the compiler's
  # workload: an annotation-heavy or inference-exploding pattern in a hot
  # generic path (Eden surface, route trees, query options) lands as
  # "typecheck got slow" weeks later with no diff to point at. This re-runs
  # tsc per project with --extendedDiagnostics and fails when the
  # deterministic size counters (Types, Instantiations) jump past a committed
  # baseline; an improvement just prompts a re-baseline. Time/memory are
  # printed but never gated (machine noise). A separate job, not a step in
  # typecheck: the guard's full per-project typechecks stacked on the turbo
  # run would blow that job's timeout; here they run in parallel instead.
  # Regenerate: `bun scripts/typecheck-baseline.ts --write-baseline`.
  typecheck-baseline:
    needs: [trust-check, ci-changes]
    if: >-
      needs.ci-changes.outputs.package_checks_required == 'true'
      && (needs.trust-check.outputs.trusted == 'true'
          || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
          submodules: true

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: "package.json"

      - name: Install dependencies
        run: bash scripts/bun-ci-retry.sh --ignore-scripts
        env:
          # .npmrc references NPM_TOKEN, but PR installs must not expose
          # the real npm token to dependency lifecycle scripts.
          NPM_TOKEN: ""

      - name: Generate types
        # The guard calls tsc directly (no turbo), so the generated inputs
        # that turbo's typecheck pipeline would produce must exist first.
        run: bun run typegen

      - name: Typecheck-cost baseline guard
        # The --self-test run first proves the parser and comparison logic,
        # so a broken guard cannot pass silently.
        run: |
          bun scripts/typecheck-baseline.ts --self-test
          bun scripts/typecheck-baseline.ts --check

  # Vite web build. Same rationale as landing-build below: the
  # required lint, typecheck, and test checks don't exercise the
  # bundler, so worker bundling / wasm-loader / plugin issues
  # surface only at deploy time. Run `vite build` on every PR
  # that could plausibly affect the web output so this class of
  # failure is caught pre-merge.
  web-build:
    needs: trust-check
    if: >-
      needs.trust-check.outputs.trusted == 'true'
      || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Check whether web-affecting paths changed
        id: changed
        env:
          BASE_REF: ${{ github.base_ref || 'main' }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          base_ref="origin/$BASE_REF"
          mapfile -t changed_files < <(git diff --name-only "$base_ref"...HEAD)
          run=false
          for file in "${changed_files[@]}"; do
            case "$file" in
              apps/web/*|packages/*|scripts/bundle-baseline.ts|scripts/bundle-baseline.json|VERSION|bun.lock|bunfig.toml|package.json|.npmrc|.github/workflows/ci.yml)
                run=true
                break
                ;;
            esac
          done
          echo "run=$run" >> "$GITHUB_OUTPUT"
          if [[ "$run" != "true" ]]; then
            echo "::notice::No web-affecting paths changed; skipping web build."
          fi

      - name: Setup Bun
        if: steps.changed.outputs.run == 'true'
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: "package.json"

      - name: Install dependencies
        if: steps.changed.outputs.run == 'true'
        run: bash scripts/bun-ci-retry.sh --ignore-scripts
        env:
          # .npmrc references NPM_TOKEN, but PR installs must not expose
          # the secret to install-time lifecycle scripts. The token is
          # only required when publishing — never to read from the public
          # npm registry. Match the ci-checks / landing-build pattern.
          NPM_TOKEN: ""

      - name: Prepare environment
        if: steps.changed.outputs.run == 'true'
        run: |
          cd ./apps/web
          mv .env.example .env

      - name: Build web
        if: steps.changed.outputs.run == 'true'
        run: bun --filter @stll/web build

      - name: Bundle size guard
        if: steps.changed.outputs.run == 'true'
        run: |
          bun scripts/bundle-baseline.ts --self-test
          bun scripts/bundle-baseline.ts --check

      - name: Prod-deps web boot smoke
        if: steps.changed.outputs.run == 'true'
        # apps/web/Dockerfile's runner installs --production (deps-prod stage).
        # Reproduce that clean production tree and boot start-runtime.js: a
        # devDependency reached by the SSR server bundle (dist/server/server.js)
        # fails to resolve here rather than at deploy time. /health is served by
        # the runtime wrapper, so a clean boot proves the production module graph
        # resolves.
        env:
          NPM_TOKEN: ""
        run: |
          set -euo pipefail
          # Reproduce apps/web/Dockerfile's deps-prod stage exactly. Wipe
          # node_modules first (a plain --production reinstall only skips ADDING
          # devDeps; it does not prune ones the build install already placed),
          # and scope to @stll/web — an unfiltered install pulls other apps' deps
          # and could mask a package the web runtime reaches but @stll/web never
          # declared. dist/ and .env are untouched.
          rm -rf node_modules
          bun install --filter @stll/web --production --frozen-lockfile --ignore-scripts
          cd apps/web
          PORT=3199 HOST=127.0.0.1 bun start-runtime.js &
          server_pid=$!
          ready=
          for _ in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:3199/health >/dev/null 2>&1; then
              ready=1
              break
            fi
            sleep 1
          done
          kill "$server_pid" 2>/dev/null || true
          if [[ "$ready" != "1" ]]; then
            echo "web SSR runtime failed to boot under --production deps" >&2
            exit 1
          fi

  # Astro landing build. The required checks run lint, typecheck,
  # and test, but no `astro build`, so plugin/runtime
  # incompatibilities surface only at deploy time. Catch those
  # here on every PR that could plausibly affect the landing
  # output.
  landing-build:
    needs: trust-check
    if: >-
      needs.trust-check.outputs.trusted == 'true'
      || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Check whether landing-affecting paths changed
        id: changed
        env:
          BASE_REF: ${{ github.base_ref || 'main' }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          base_ref="origin/$BASE_REF"
          mapfile -t changed_files < <(git diff --name-only "$base_ref"...HEAD)
          run=false
          for file in "${changed_files[@]}"; do
            case "$file" in
              apps/landing/*|docs/changelog/*|VERSION|packages/*|bun.lock|package.json|.github/workflows/ci.yml)
                run=true
                break
                ;;
            esac
          done
          echo "run=$run" >> "$GITHUB_OUTPUT"
          if [[ "$run" != "true" ]]; then
            echo "::notice::No landing-affecting paths changed; skipping landing build."
          fi

      - name: Setup Bun
        if: steps.changed.outputs.run == 'true'
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: "package.json"

      - name: Install dependencies
        if: steps.changed.outputs.run == 'true'
        run: bash scripts/bun-ci-retry.sh --ignore-scripts
        env:
          # .npmrc references NPM_TOKEN, but PR installs must not expose
          # the real npm token to dependency lifecycle scripts.
          NPM_TOKEN: ""

      - name: Build landing
        if: steps.changed.outputs.run == 'true'
        run: bun --filter @stll/landing build

  # Playwright end-to-end suite. Boots the full local stack
  # (Postgres, MinIO, Valkey, Gotenberg) plus the API and web
  # dev server, then runs the E2E specs under
  # apps/web/e2e/. Catches integration regressions that
  # lint/typecheck/unit tests miss (auth, routing, upload flow,
  # document rendering).
  e2e:
    needs: trust-check
    if: >-
      needs.trust-check.outputs.trusted == 'true'
      || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Check whether E2E-affecting paths changed
        id: changed
        env:
          BASE_REF: ${{ github.base_ref || 'main' }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          base_ref="origin/$BASE_REF"
          mapfile -t changed_files < <(git diff --name-only "$base_ref"...HEAD)
          run=false
          for file in "${changed_files[@]}"; do
            case "$file" in
              apps/web/*|apps/api/*|packages/*|docker-compose.yml|bun.lock|package.json|.github/workflows/ci.yml)
                run=true
                break
                ;;
            esac
          done
          echo "run=$run" >> "$GITHUB_OUTPUT"
          if [[ "$run" != "true" ]]; then
            echo "::notice::No E2E-affecting paths changed; skipping E2E."
          fi

      - name: Setup Bun
        if: steps.changed.outputs.run == 'true'
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: "package.json"

      - name: Install dependencies
        if: steps.changed.outputs.run == 'true'
        run: bash scripts/bun-ci-retry.sh --ignore-scripts
        env:
          NPM_TOKEN: ""

      - name: Prepare environment
        if: steps.changed.outputs.run == 'true'
        run: |
          cd ./apps/api
          mv .env.example .env
          cd ../web
          mv .env.example .env

      - name: Check Docker Hub credentials
        id: dockerhub
        # Keep Docker Hub secrets scoped to this trusted inline check, not the
        # whole job environment where repository-controlled code can read them.
        if: steps.changed.outputs.run == 'true'
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [[ -n "$DOCKERHUB_USERNAME" && -n "$DOCKERHUB_TOKEN" ]]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "available=false" >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub
        # Skipped automatically until DOCKERHUB_USERNAME / DOCKERHUB_TOKEN repo
        # secrets exist; authenticated pulls raise the rate limit well above the
        # shared-runner anonymous cap that flakes the gotenberg image pull.
        if: steps.changed.outputs.run == 'true' && steps.dockerhub.outputs.available == 'true'
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Start docker stack
        if: steps.changed.outputs.run == 'true'
        # `--wait` only on long-running services; `minio-setup` is a one-shot
        # bucket-creator container that exits 0, which `--wait` treats as
        # "not running" and fails the whole command. Run it separately in
        # the foreground so we still block on its success. The whole bring-up
        # is retried: image pulls and `--wait` health checks occasionally fail
        # transiently on CI runners. Tear the stack down between attempts so a
        # half-started stack does not poison the retry.
        run: |
          for attempt in 1 2 3; do
            if docker compose --profile dev up -d --wait postgres minio valkey gotenberg \
              && docker compose --profile dev up minio-setup; then
              exit 0
            fi
            echo "::warning::docker stack start failed (attempt ${attempt}/3); tearing down and retrying"
            docker compose --profile dev down --volumes --remove-orphans || true
            sleep "$((attempt * 20))"
          done
          echo "::error::docker stack failed to start after 3 attempts"
          exit 1

      - name: Log out of Docker Hub
        # Remove credentials from the runner before executing app code and tests.
        if: always() && steps.changed.outputs.run == 'true' && steps.dockerhub.outputs.available == 'true'
        run: docker logout

      - name: Run database migrations
        if: steps.changed.outputs.run == 'true'
        # `db:migrate` (not `db:push`) so role bootstrap migrations such as
        # `20260516000000_case_law_ingestion_role` actually execute. `db:push`
        # only diffs the declarative schema, which references `stella_ingestion`
        # as `existing()` and then fails when later policy creates target it.
        run: bun --filter @stll/api db:migrate

      - name: Seed test user
        if: steps.changed.outputs.run == 'true'
        run: bun --filter @stll/api db:seed-test-user

      - name: Start API server
        if: steps.changed.outputs.run == 'true'
        # `--watch` is for local dev; CI runs the server flat. Logs land in
        # /tmp/api.log so the "Upload server logs" step can publish them on
        # failure for debugging.
        run: |
          cd apps/api
          # --preload registers the dev/test-only mock-AI generator; .env.example
          # sets USE_MOCK_AI=true, so e2e must route through the mock rather than
          # the real provider (which would fail on the placeholder API key).
          NODE_ENV=development E2E_DISABLE_AUTH_RATE_LIMIT=true nohup bun --port 3001 --preload ./src/dev/register-mock-ai.ts src/server.ts > /tmp/api.log 2>&1 &
          echo $! > /tmp/api.pid

      - name: Wait for API
        if: steps.changed.outputs.run == 'true'
        run: |
          for i in {1..60}; do
            if curl --connect-timeout 2 --max-time 5 -sf http://localhost:3001/health > /dev/null 2>&1; then
              echo "API up after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "::error::API never came up"
          tail -200 /tmp/api.log || true
          exit 1

      - name: Start web dev server
        if: steps.changed.outputs.run == 'true'
        run: |
          cd apps/web
          nohup bun --bun vite --port 3000 > /tmp/web.log 2>&1 &
          echo $! > /tmp/web.pid

      - name: Wait for web
        if: steps.changed.outputs.run == 'true'
        run: |
          for i in {1..60}; do
            if curl --connect-timeout 2 --max-time 5 -sf http://localhost:3000 > /dev/null 2>&1; then
              echo "Web up after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "::error::Web never came up"
          tail -200 /tmp/web.log || true
          exit 1

      - name: Install Playwright browsers
        if: steps.changed.outputs.run == 'true'
        run: cd apps/web && bunx playwright install --with-deps chromium

      - name: Run Playwright tests
        if: steps.changed.outputs.run == 'true'
        run: bun --filter @stll/web test:e2e

      # Flake guard: the dev server's dependency optimizer must finish during
      # the cold pass. A second pass mid-session prints "optimized dependencies
      # changed. reloading" and forces a full-page reload that can tear the page
      # down mid-test (see optimizeDeps.include in apps/web/vite.config.ts).
      # Fail loudly — even on a lucky pass — so a newly added lazy/runtime dep
      # that escapes the cold scan is fixed at its source instead of flaking.
      - name: Guard against mid-test Vite re-optimize
        if: always() && steps.changed.outputs.run == 'true'
        run: |
          if grep -q "optimized dependencies changed. reloading" /tmp/web.log; then
            echo "::error::Vite re-optimized dependencies mid-session and forced a reload. A dependency reachable only via a lazy/runtime import is missing from optimizeDeps.include in apps/web/vite.config.ts — add the dep(s) named below."
            grep -nE "new dependencies optimized|optimized dependencies changed" /tmp/web.log || true
            exit 1
          fi
          echo "No mid-session dep re-optimize detected."

      - name: Upload Playwright report
        if: failure() && steps.changed.outputs.run == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7

      - name: Upload server logs
        if: failure() && steps.changed.outputs.run == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: server-logs
          path: |
            /tmp/api.log
            /tmp/web.log
          retention-days: 7

  # Image dependency guard. The API and legal-atlas-runner Dockerfiles use
  # Turbo only for pruned source overlays; dependency installs come from the
  # committed root bun.lock plus every workspace package.json so Bun remains
  # the lockfile source of truth. Mirror that install path here so deploy-time
  # lockfile drift fails the PR instead of the deploy.
  #
  # The job then compiles the API entrypoints and runs the legal atlas runner
  # production smoke against those Docker-style dependency trees.
  api-image-deps:
    needs: trust-check
    if: >-
      needs.trust-check.outputs.trusted == 'true'
      || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Check whether API/runner-image-affecting paths changed
        id: changed
        env:
          BASE_REF: ${{ github.base_ref || 'main' }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          base_ref="origin/$BASE_REF"
          mapfile -t changed_files < <(git diff --name-only "$base_ref"...HEAD)
          run=false
          for file in "${changed_files[@]}"; do
            case "$file" in
              apps/api/*|apps/legal-atlas-runner/*|packages/*|bun.lock|bunfig.toml|package.json|.npmrc|turbo.json|.github/workflows/ci.yml)
                run=true
                break
                ;;
            esac
          done
          echo "run=$run" >> "$GITHUB_OUTPUT"
          if [[ "$run" != "true" ]]; then
            echo "::notice::No API/runner-image-affecting paths changed; skipping image dependency guard."
          fi

      - name: Setup Bun
        if: steps.changed.outputs.run == 'true'
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: "package.json"

      - name: Install turbo
        if: steps.changed.outputs.run == 'true'
        # Match the Dockerfiles: Turbo is only used for pruned source overlays.
        run: bun install -g turbo@2.10.4

      - name: Prepare Docker install inputs
        if: steps.changed.outputs.run == 'true'
        run: |
          set -euo pipefail
          rm -rf install-json
          mkdir -p install-json
          cp bun.lock package.json install-json/
          for f in bunfig.toml .npmrc; do [ ! -e "$f" ] || cp "$f" install-json/; done
          find apps packages -mindepth 2 -maxdepth 2 -name package.json \
            -not -path '*/node_modules/*' \
            -exec cp --parents -t install-json/ {} +

      - name: Prune monorepo for API image source
        if: steps.changed.outputs.run == 'true'
        run: turbo prune @stll/api @stll/legal-atlas-runner --docker

      - name: Install API image deps with frozen root lockfile
        if: steps.changed.outputs.run == 'true'
        run: |
          set -euo pipefail
          rm -rf api-install
          cp -a install-json api-install
          cd api-install
          bun install --filter @stll/api --filter @stll/legal-atlas-runner --frozen-lockfile --ignore-scripts
        env:
          NPM_TOKEN: ""

      - name: API image compile smoke
        if: steps.changed.outputs.run == 'true'
        # Overlay pruned source the same way apps/api/Dockerfile copies
        # /app/out/full/ onto the dependency layer, then compile the API
        # binary and runtime workers.
        run: |
          set -euo pipefail
          cd api-install
          cp -a ../out/full/. .
          export NODE_ENV=production
          bun build \
            --compile \
            --minify-whitespace \
            --minify-syntax \
            --target bun \
            --outfile /tmp/server \
            apps/api/src/server.ts
          mkdir -p /tmp/runtime-workers
          bun build \
            --target bun \
            --outfile /tmp/runtime-workers/pdf-worker.js \
            apps/api/src/handlers/files/pdf-worker.ts
          bun build \
            --target bun \
            --outfile /tmp/runtime-workers/extraction-worker.js \
            apps/api/src/lib/search/extraction-worker.ts
        env:
          NPM_TOKEN: ""

      - name: Prod-deps legal atlas runner smoke
        if: steps.changed.outputs.run == 'true'
        run: |
          set -euo pipefail
          rm -rf out-runner
          turbo prune @stll/legal-atlas-runner --docker --out-dir out-runner
          rm -rf runner-install
          cp -a install-json runner-install
          cd runner-install
          bun install --filter @stll/legal-atlas-runner --production --frozen-lockfile --ignore-scripts
          cp -a ../out-runner/full/. .
          bun --filter @stll/legal-atlas-runner build
          bun apps/legal-atlas-runner/dist/index.js smoke
          set +e
          out=$(DATABASE_URL=postgres://smoke:smoke@localhost:5432/smoke \
                S3_ENDPOINT=http://localhost \
                S3_BUCKET=smoke \
                S3_REGION=eu-central-1 \
                bun apps/legal-atlas-runner/dist/index.js run case-law-ingest __smoke__ 2>&1)
          status=$?
          set -e
          echo "$out"
          if ! echo "$out" | grep -q 'Unknown adapter: __smoke__'; then
            echo "ERROR: legal-atlas runner smoke failed under --production (exit=$status)" >&2
            exit 1
          fi
        env:
          NPM_TOKEN: ""

  # Narrow Windows smoke for the dev runner. Full app CI stays on Linux,
  # but this catches path and shell assumptions in the scripts package
  # before Windows contributors hit them locally.
  windows-scripts:
    needs: trust-check
    if: >-
      needs.trust-check.outputs.trusted == 'true'
      || github.event_name == 'workflow_dispatch'
    runs-on: windows-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Check whether scripts-affecting paths changed
        id: changed
        shell: bash
        env:
          BASE_REF: ${{ github.base_ref || 'main' }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          base_ref="origin/$BASE_REF"
          mapfile -t changed_files < <(git diff --name-only "$base_ref"...HEAD)
          run=false
          for file in "${changed_files[@]}"; do
            case "$file" in
              packages/scripts/*|package.json|bun.lock|.github/workflows/ci.yml)
                run=true
                break
                ;;
            esac
          done
          echo "run=$run" >> "$GITHUB_OUTPUT"
          if [[ "$run" != "true" ]]; then
            echo "::notice::No scripts-affecting paths changed; skipping Windows scripts smoke."
          fi

      - name: Setup Bun
        if: steps.changed.outputs.run == 'true'
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: "package.json"

      - name: Install scripts workspace dependencies
        if: steps.changed.outputs.run == 'true'
        run: bun install --frozen-lockfile --ignore-scripts --filter @stll/scripts
        env:
          NPM_TOKEN: ""

      - name: Test dev runner
        if: steps.changed.outputs.run == 'true'
        run: bun test packages/scripts/src/dev-runner.test.ts

  # Rust checks for the Tauri desktop crate. ci-checks only runs
  # `cargo fmt --check` (a parse-only pass that needs no compile);
  # check/clippy/doc must run where the desktop crate actually builds
  # so platform-gated macOS and Windows code is covered.
  #
  # The matrix mirrors the release matrix (macos-14 + windows-latest)
  # rather than Linux: the desktop app ships only those two targets,
  # and clippy analyzes the active `cfg` for its host — so these two
  # runners cover the `#[cfg(target_os = "macos")]` / `"windows"`
  # code that ships, with no need for the Linux webkit2gtk system
  # libraries a Linux clippy run would require. Windows builds the
  # test binaries but does not execute them: hosted Windows currently
  # exits before the Rust test harness starts with a native entrypoint
  # error in the Tauri-linked binary. macOS executes the test suite.
  # Both are standard GitHub-hosted runners, free for public repositories.
  desktop-clippy:
    name: Desktop Rust (${{ matrix.os }})
    needs: [trust-check, ci-changes]
    if: >-
      (needs.trust-check.outputs.trusted == 'true'
       || github.event_name == 'workflow_dispatch')
      && needs.ci-changes.outputs.desktop_rust_checks_required == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos
            runner: macos-14
            target: aarch64-apple-darwin
          - os: windows
            runner: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 35
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}
          components: clippy

      # No cargo cache action here: the job is path-filtered to desktop
      # changes, so it runs rarely and a cold compile (well under the
      # timeout) is acceptable. It also keeps the LGPL-3.0 rust-cache
      # action out of the dependency-review-enforced diff.
      - name: Check
        run: cargo check --manifest-path apps/desktop/src-tauri/Cargo.toml --workspace --all-targets --target ${{ matrix.target }} --locked

      - name: Clippy
        run: cargo clippy --manifest-path apps/desktop/src-tauri/Cargo.toml --workspace --all-targets --target ${{ matrix.target }} --locked -- -D warnings

      - name: Test
        if: matrix.os == 'macos'
        run: cargo test --manifest-path apps/desktop/src-tauri/Cargo.toml --workspace --all-targets --target ${{ matrix.target }} --locked

      - name: Build test binaries
        if: matrix.os == 'windows'
        run: cargo test --manifest-path apps/desktop/src-tauri/Cargo.toml --workspace --all-targets --target ${{ matrix.target }} --locked --no-run

      - name: Install cargo-deny
        if: matrix.os == 'macos'
        run: cargo install cargo-deny --version 0.19.0 --locked

      - name: License audit
        if: matrix.os == 'macos'
        run: cargo deny --manifest-path apps/desktop/src-tauri/Cargo.toml check --config apps/desktop/src-tauri/deny.toml --hide-inclusion-graph

      - name: Docs
        run: cargo doc --manifest-path apps/desktop/src-tauri/Cargo.toml --workspace --no-deps --target ${{ matrix.target }} --locked
        env:
          RUSTDOCFLAGS: -D warnings

  # Aggregation job for branch protection. The ruleset requires
  # this check to pass, which ensures untrusted PRs cannot be
  # merged without CI and trusted PRs must pass all checks.
  ci-result:
    name: >-
      ${{
        github.event_name == 'pull_request'
        && github.event.action == 'labeled'
        && github.event.label.name != 'run-ci'
        && format('ci-result-ignored-label-{0}', github.run_id)
        || 'ci-result'
      }}
    if: always()
    needs:
      [
        trust-check,
        ci-checks,
        lint,
        typecheck,
        typecheck-baseline,
        web-build,
        landing-build,
        e2e,
        api-image-deps,
        windows-scripts,
        ci-changes,
        desktop-clippy,
      ]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Evaluate CI outcome
        env:
          API_IMAGE_DEPS_RESULT: ${{ needs.api-image-deps.result }}
          CI_CHANGES_RESULT: ${{ needs.ci-changes.result }}
          CI_RESULT: ${{ needs.ci-checks.result }}
          DESKTOP_CLIPPY_RESULT: ${{ needs.desktop-clippy.result }}
          E2E_RESULT: ${{ needs.e2e.result }}
          EVENT: ${{ github.event_name }}
          LANDING_RESULT: ${{ needs.landing-build.result }}
          LINT_RESULT: ${{ needs.lint.result }}
          TRUSTED: ${{ needs.trust-check.outputs.trusted }}
          TRUST_RESULT: ${{ needs.trust-check.result }}
          TYPECHECK_BASELINE_RESULT: ${{ needs.typecheck-baseline.result }}
          TYPECHECK_RESULT: ${{ needs.typecheck.result }}
          WEB_RESULT: ${{ needs.web-build.result }}
          WINDOWS_SCRIPTS_RESULT: ${{ needs.windows-scripts.result }}
        run: |
          # When the trust-check job was skipped (draft PR or
          # irrelevant label event), all downstream jobs are also
          # skipped. This is expected and should not block the PR.
          if [[ "$TRUST_RESULT" == "skipped" ]]; then
            echo "Trust-check skipped. Passing."
            exit 0
          fi

          if [[ "$EVENT" == "workflow_dispatch" ]]; then
            if [[ "$CI_RESULT" == "failure" || "$CI_RESULT" == "cancelled" \
                  || "$LINT_RESULT" == "failure" || "$LINT_RESULT" == "cancelled" \
                  || "$TYPECHECK_RESULT" == "failure" || "$TYPECHECK_RESULT" == "cancelled" \
                  || "$TYPECHECK_BASELINE_RESULT" == "failure" || "$TYPECHECK_BASELINE_RESULT" == "cancelled" \
                  || "$WEB_RESULT" == "failure" || "$WEB_RESULT" == "cancelled" \
                  || "$LANDING_RESULT" == "failure" || "$LANDING_RESULT" == "cancelled" \
                  || "$E2E_RESULT" == "failure" || "$E2E_RESULT" == "cancelled" \
                  || "$API_IMAGE_DEPS_RESULT" == "failure" || "$API_IMAGE_DEPS_RESULT" == "cancelled" \
                  || "$WINDOWS_SCRIPTS_RESULT" == "failure" || "$WINDOWS_SCRIPTS_RESULT" == "cancelled" \
                  || "$CI_CHANGES_RESULT" == "failure" || "$CI_CHANGES_RESULT" == "cancelled" \
                  || "$DESKTOP_CLIPPY_RESULT" == "failure" || "$DESKTOP_CLIPPY_RESULT" == "cancelled" ]]; then
              echo "::error::CI checks failed."
              exit 1
            fi
            exit 0
          fi

          if [[ "$TRUSTED" != "true" ]]; then
            echo "::error::CI was not run. A maintainer must review the code and add the 'run-ci' label."
            exit 1
          fi

          # "cancelled" means cancel-in-progress replaced this
          # run with a newer one; the newer run is authoritative.
          if [[ "$CI_RESULT" == "cancelled" || "$LINT_RESULT" == "cancelled" || "$TYPECHECK_RESULT" == "cancelled" || "$TYPECHECK_BASELINE_RESULT" == "cancelled" || "$WEB_RESULT" == "cancelled" || "$LANDING_RESULT" == "cancelled" || "$E2E_RESULT" == "cancelled" || "$API_IMAGE_DEPS_RESULT" == "cancelled" || "$WINDOWS_SCRIPTS_RESULT" == "cancelled" || "$CI_CHANGES_RESULT" == "cancelled" || "$DESKTOP_CLIPPY_RESULT" == "cancelled" ]]; then
            echo "CI run was superseded by a newer run (cancel-in-progress). Passing."
            exit 0
          fi

          if [[ "$CI_RESULT" == "failure" || "$LINT_RESULT" == "failure" || "$TYPECHECK_RESULT" == "failure" || "$TYPECHECK_BASELINE_RESULT" == "failure" || "$WEB_RESULT" == "failure" || "$LANDING_RESULT" == "failure" || "$E2E_RESULT" == "failure" || "$API_IMAGE_DEPS_RESULT" == "failure" || "$WINDOWS_SCRIPTS_RESULT" == "failure" || "$CI_CHANGES_RESULT" == "failure" || "$DESKTOP_CLIPPY_RESULT" == "failure" ]]; then
            echo "::error::CI checks failed."
            exit 1
          fi
