name: Release Desktop App

# Build, sign, and publish the Tauri desktop app for each release tag.
# Runs after release.yml succeeds so the GitHub Release object already
# exists; this workflow only adds desktop installers + the updater
# manifest to it. Skipped automatically when nothing in apps/desktop
# (or its bundled shared packages) changed since the previous tag, so
# backend-only releases don't churn a 30 MB redownload.
#
# Builds Windows + macOS in parallel. Windows uses Azure Trusted
# Signing; macOS uses a Developer ID Application cert + App Store
# Connect API key for notarization.

on:
  workflow_run:
    workflows: ["Release Artifacts"]
    types: [completed]
  workflow_dispatch:
    inputs:
      release_ref:
        description: "Existing release tag, e.g. v0.0.1"
        required: true
        type: string

# Default-deny at the workflow level; each job uplifts only what it
# needs. Pattern from lapce/lapce/.github/workflows/release.yml.
permissions: {}

concurrency:
  group: release-desktop-${{ github.event.workflow_run.head_branch || inputs.release_ref }}
  cancel-in-progress: false

jobs:
  resolve:
    # Trigger on `success` OR `failure` of release.yml — desktop
    # builds don't depend on the API/ingestion deploy succeeding.
    # The release.yml `publish` job (which creates the GitHub
    # Release object we upload to) runs before `promote` (the API
    # deploy that's been the recurring failure point); as long as
    # publish succeeded, the Release exists and resolve below can
    # find it. If even publish failed, our own gh api lookup of
    # the tag will fail-fast with a clear error.
    #
    # Skip `cancelled` (a newer release.yml run replaced it; that
    # newer run will trigger us instead) and `skipped` (release.yml
    # never actually ran, so there's nothing for us to release).
    if: ${{ github.event_name == 'workflow_dispatch' || (contains(fromJSON('["success", "failure"]'), github.event.workflow_run.conclusion) && startsWith(github.event.workflow_run.head_branch, 'v')) }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      actions: read   # read upstream workflow_run artifacts
      contents: read  # checkout
    outputs:
      release_ref: ${{ steps.ref.outputs.value }}
      release_sha: ${{ steps.ref.outputs.sha }}
      app_version: ${{ steps.ref.outputs.version }}
      should_build: ${{ steps.diff.outputs.should_build }}
      # Channel directory name (`prod`, `rc`, `beta`, `alpha`)
      # derived from the tag suffix by scripts/release-channel.sh.
      # Used to route the updater manifest to a channel-specific
      # S3 path and to pin the in-binary updater endpoint, so an rc
      # build never polls or overwrites the production manifest.
      channel: ${{ steps.ref.outputs.channel }}
    steps:
      # Lightweight first-pass checkout of the workflow's own ref
      # (not the release tag yet — that resolves below) so the
      # Resolve step can shell out to scripts/release-channel.sh.
      # The pinned-SHA checkout further down then re-checks out
      # the release commit for everything else.
      - name: Checkout workflow scripts
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          sparse-checkout: scripts
          sparse-checkout-cone-mode: false

      - name: Resolve release ref
        id: ref
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          RELEASE_INPUT: ${{ inputs.release_ref }}
          UPSTREAM_EVENT: ${{ github.event.workflow_run.event }}
          UPSTREAM_RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          if [[ -n "$RELEASE_INPUT" ]]; then
            REF="$RELEASE_INPUT"
          elif [[ "$HEAD_BRANCH" == v* ]]; then
            REF="$HEAD_BRANCH"
          elif [[ "$UPSTREAM_EVENT" == "workflow_dispatch" ]]; then
            manifest_artifact=$(
              gh api "repos/${GITHUB_REPOSITORY}/actions/runs/$UPSTREAM_RUN_ID/artifacts" \
                --jq '.artifacts[].name | select(startswith("release-manifest-v"))' \
                | head -n 1
            )
            REF="${manifest_artifact#release-manifest-}"
          else
            REF="$HEAD_BRANCH"
          fi

          # Pattern must stay aligned with scripts/release-channel.sh
          # and .github/workflows/release.yml — all three gate on the
          # same shape so a tag accepted by one is accepted by all.
          # The prerelease channel is whitelisted to rc|beta|alpha:
          # a free `[a-z]+` would let `v1.2.3-prod.1` overwrite the
          # stable manifest in S3.
          if [[ ! "$REF" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-(rc|beta|alpha)\.[0-9]+)?$ ]]; then
            echo "::error::Expected a release tag like v1.2.3, v1.2.3-rc.1, v1.2.3-beta.1, or v1.2.3-alpha.1; got '$REF'"
            exit 1
          fi

          # Refuse to proceed if a branch with the same name as the
          # tag exists. Bare-ref checkouts would otherwise be
          # ambiguous, and this workflow holds Tauri/Apple/Azure
          # signing secrets — checking out attacker-controlled
          # branch code under a release-tag name would mint
          # officially-signed installers.
          if gh api "repos/${GITHUB_REPOSITORY}/branches/${REF}" --silent 2>/dev/null; then
            echo "::error::A branch named '$REF' exists alongside the tag; refusing to build to avoid ref ambiguity"
            exit 1
          fi

          # Resolve the tag to a concrete commit SHA. Every
          # downstream checkout is pinned to this SHA so the build
          # cannot be swapped out by a same-named branch later in
          # the workflow.
          tag_ref_json=$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${REF}" 2>/dev/null) || {
            echo "::error::Tag $REF does not exist in ${GITHUB_REPOSITORY}"
            exit 1
          }
          tag_object_type=$(echo "$tag_ref_json" | jq -r '.object.type')
          tag_object_sha=$(echo "$tag_ref_json" | jq -r '.object.sha')
          if [[ "$tag_object_type" == "tag" ]]; then
            # Annotated tag — dereference to the underlying commit.
            RELEASE_SHA=$(gh api "repos/${GITHUB_REPOSITORY}/git/tags/${tag_object_sha}" --jq '.object.sha')
          else
            RELEASE_SHA="$tag_object_sha"
          fi
          if [[ ! "$RELEASE_SHA" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::Could not resolve tag $REF to a commit SHA (got '$RELEASE_SHA')"
            exit 1
          fi

          # Resolve the channel via the shared script so the
          # in-binary updater endpoint, the manifest mirror path,
          # and the CloudFront invalidation key all derive from
          # exactly the same logic. See scripts/release-channel.sh.
          CHANNEL=$(bash scripts/release-channel.sh "$REF")

          echo "value=$REF" >> "$GITHUB_OUTPUT"
          echo "sha=$RELEASE_SHA" >> "$GITHUB_OUTPUT"
          echo "version=${REF#v}" >> "$GITHUB_OUTPUT"
          echo "channel=$CHANNEL" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          # Pin to the resolved commit SHA to eliminate tag/branch
          # ref ambiguity. The tag name is preserved in
          # `steps.ref.outputs.value` for filenames/release lookups.
          ref: ${{ steps.ref.outputs.sha }}
          fetch-depth: 0

      - name: Decide whether desktop changed since previous tag
        id: diff
        env:
          CURRENT_TAG: ${{ steps.ref.outputs.value }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Stable releases are canonical: always build so latest.json
          # is fresh and stable-channel users always get an upgrade
          # path. The skip optimization only applies to prereleases,
          # where rapid iteration on backend-only changes shouldn't
          # churn desktop redownloads. This also avoids a subtle bug
          # where the rc->stable promotion points the stable tag at
          # the same commit as the rc and the diff comes up empty.
          if [[ "$CURRENT_TAG" != *-* ]]; then
            echo "Stable release ($CURRENT_TAG); always building desktop."
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # For prereleases, find the most recent prerelease tag that
          # actually shipped desktop artifacts (i.e. has latest.json on
          # its GitHub Release). If none, build. This pins the diff
          # window to the last release a desktop client would have
          # received, instead of any tag that happens to exist.
          previous=""
          while IFS= read -r tag; do
            [[ -z "$tag" || "$tag" == "$CURRENT_TAG" ]] && continue
            [[ "$tag" != *-* ]] && continue
            if gh release view "$tag" --json assets \
                --jq '.assets[].name' 2>/dev/null \
                | grep -qx 'latest.json'; then
              previous="$tag"
              break
            fi
          done < <(git tag --sort=-creatordate --list 'v*')
          if [[ -z "$previous" ]]; then
            echo "No previous prerelease with desktop artifacts; will build."
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Comparing $previous..$CURRENT_TAG for desktop-relevant changes"
          # Paths that justify a desktop rebuild. apps/web is included
          # because the Tauri build embeds the web bundle. VERSION is
          # intentionally excluded — every tag exists because VERSION
          # bumped, so including it would defeat the skip entirely.
          changed=$(git diff --name-only "$previous" "$CURRENT_TAG" -- \
            apps/desktop/ \
            apps/web/ \
            packages/folio/ \
            packages/ui/ \
            || true)
          if [[ -n "$changed" ]]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          else
            echo "No desktop-relevant changes; skipping desktop build."
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: resolve
    if: ${{ needs.resolve.outputs.should_build == 'true' }}
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    permissions:
      # contents:write is for the per-platform `gh release upload`
      # step that pushes the signed installers + .sig files to the
      # GitHub Release.
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            rust_targets: x86_64-pc-windows-msvc
          - os: macos
            runner: macos-14
            # Tauri builds a universal binary by lipoing the two
            # native-arch outputs together; rustup needs the two real
            # archs as targets, not the synthetic "universal" name.
            target: universal-apple-darwin
            rust_targets: aarch64-apple-darwin,x86_64-apple-darwin

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          # Pinned to the SHA resolved by the resolve job; never to
          # the bare tag name. See resolve job for rationale.
          ref: ${{ needs.resolve.outputs.release_sha }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: "package.json"

      - name: Install dependencies
        run: bun ci
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
          targets: ${{ matrix.rust_targets }}

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2
        with:
          workspaces: apps/desktop/src-tauri -> target

      - name: Stamp release version into tauri.conf.json + Cargo.toml
        shell: bash
        env:
          VERSION: ${{ needs.resolve.outputs.app_version }}
        run: |
          # tauri.conf.json: replace `"version": "..."` on a single line.
          node -e "
            const fs = require('fs');
            const path = 'apps/desktop/src-tauri/tauri.conf.json';
            const conf = JSON.parse(fs.readFileSync(path, 'utf8'));
            conf.version = process.env.VERSION;
            fs.writeFileSync(path, JSON.stringify(conf, null, 2) + '\n');
          "
          # Cargo.toml: replace the package version line in-place.
          node -e "
            const fs = require('fs');
            const path = 'apps/desktop/src-tauri/Cargo.toml';
            const toml = fs.readFileSync(path, 'utf8');
            const out = toml.replace(/^version = \"[^\"]+\"/m, 'version = \"' + process.env.VERSION + '\"');
            fs.writeFileSync(path, out);
          "

      # The updater endpoint is baked into the binary at build time.
      # Without per-channel pinning, every build (stable + rc + beta)
      # would poll the same endpoint, defeating the channel split on
      # the publish side. Stamp the channel-specific URL into the
      # config so an rc-built install only ever sees rc updates.
      - name: Pin updater endpoint to release channel
        shell: bash
        env:
          CHANNEL: ${{ needs.resolve.outputs.channel }}
        run: |
          channel_dir="${CHANNEL:-prod}"
          endpoint="https://downloads.stll.app/desktop/$channel_dir/latest.json"
          conf=apps/desktop/src-tauri/tauri.conf.json
          jq --arg e "$endpoint" \
            '.plugins.updater.endpoints = [$e]' \
            "$conf" > "$conf.tmp"
          mv "$conf.tmp" "$conf"
          echo "Updater endpoint set to: $endpoint"

      # ─── Windows: Azure Trusted Signing ────────────────────
      # trusted-signing-cli is invoked by Tauri's bundler via
      # bundle.windows.signCommand for every artifact (inner exe,
      # installer, updater archive contents) so the .nsis.zip /
      # .msi.zip the updater downloads wrap signed binaries. The
      # post-build Azure step below stays as a safety net for any
      # loose artifact the bundler doesn't run signCommand against.
      # baptiste0928/cargo-install caches ~/.cargo/bin/<binary>
      # keyed on tool + version + runner image, so subsequent runs
      # short-circuit the ~5 min source compile.
      - name: Install trusted-signing-cli (Windows only)
        if: matrix.os == 'windows'
        uses: baptiste0928/cargo-install@f204293d9709061b7bc1756fec3ec4e2cd57dec0 # v3.4.0
        with:
          crate: trusted-signing-cli
          version: "0.10.0"
          locked: true

      # windows-latest currently resolves to windows-2025, which
      # ships only newer Windows SDKs. trusted-signing-cli falls
      # back to a hard-coded SDK path that no longer exists on the
      # image, exiting silently before any signing happens. Resolve
      # signtool.exe at runtime and pin SIGNTOOL_PATH for the rest
      # of the job. Per tauri-apps/tauri#13991.
      - name: Locate signtool.exe (Windows only)
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          $st = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\10.*\x64\signtool.exe" |
                Sort-Object Name -Descending |
                Select-Object -First 1
          if (-not $st) { throw "signtool.exe not found under Windows Kits 10 bin" }
          Write-Host "Using $($st.FullName)"
          "SIGNTOOL_PATH=$($st.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append

      # Tauri spawns bundle.windows.signCommand directly via
      # Command::new (no shell), so %VAR%-style env interpolation
      # isn't applied — placeholders arrive at trusted-signing-cli
      # as literal strings and the auth call fails. Substitute the
      # values at build time so the spawned process gets the real
      # endpoint/account/profile.
      #
      # Shape mirrors Yaak's proven Trusted Signing config: single-
      # token args only, %1 placeholder, and no `-d` description.
      # trusted-signing-cli doesn't require -d; including a multi-
      # word value invites shell-quoting failures because Tauri
      # parses signCommand with shlex::split and forwards each
      # token verbatim — embedded \" survives literally and signtool
      # then treats the second word as a separate file path.
      - name: Inline Azure values into bundle.windows.signCommand
        if: matrix.os == 'windows'
        shell: bash
        env:
          AZURE_ENDPOINT: ${{ secrets.AZURE_ENDPOINT }}
          AZURE_CODE_SIGNING_ACCOUNT: ${{ secrets.AZURE_CODE_SIGNING_ACCOUNT }}
          AZURE_CERT_PROFILE: ${{ secrets.AZURE_CERT_PROFILE }}
        run: |
          conf=apps/desktop/src-tauri/tauri.conf.json
          cmd="trusted-signing-cli -e $AZURE_ENDPOINT -a $AZURE_CODE_SIGNING_ACCOUNT -c $AZURE_CERT_PROFILE %1"
          jq --arg c "$cmd" '.bundle.windows.signCommand = $c' "$conf" > "$conf.tmp"
          mv "$conf.tmp" "$conf"

      - name: Build (Windows)
        if: matrix.os == 'windows'
        working-directory: apps/desktop
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # OAuth triple consumed by trusted-signing-cli (invoked
          # via tauri.conf.json bundle.windows.signCommand).
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_ENDPOINT: ${{ secrets.AZURE_ENDPOINT }}
          AZURE_CODE_SIGNING_ACCOUNT: ${{ secrets.AZURE_CODE_SIGNING_ACCOUNT }}
          AZURE_CERT_PROFILE: ${{ secrets.AZURE_CERT_PROFILE }}
        # `--verbose --verbose` surfaces the per-line stdout/stderr
        # Tauri captures from signCommand but otherwise hides behind
        # log::debug. Without it, a trusted-signing-cli failure
        # bubbles up as the opaque "failed to run trusted-signing-cli"
        # with no SignTool error attached. Per the Tauri maintainer
        # in tauri-apps/tauri#11778 + tauri-apps/tauri#13991.
        # NSIS only (no MSI). MSI uses a 4-part 16-bit Windows
        # installer version that can't represent semver prerelease
        # suffixes. NSIS has no such constraint and is what most
        # OSS Tauri apps ship (Yaak, etc.).
        #
        # Do NOT add `updater` to --bundles. In Tauri 2 the updater
        # archives are emitted as a side effect of building the
        # platform installer when bundle.createUpdaterArtifacts is
        # true; passing the (no-longer-existing) `updater` bundle
        # name explicitly silently bypasses that side effect, so
        # only the .exe lands and no .nsis.zip is created.
        run: bun run build -- --target ${{ matrix.target }} --bundles nsis --verbose --verbose

      - name: Sign Windows installers via Azure Trusted Signing
        if: matrix.os == 'windows'
        uses: azure/trusted-signing-action@b443cf8ea4124818d2ea9f043cba29fc3ec47b16 # v1.2.0
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: ${{ secrets.AZURE_ENDPOINT }}
          trusted-signing-account-name: ${{ secrets.AZURE_CODE_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ secrets.AZURE_CERT_PROFILE }}
          files-folder: apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle
          files-folder-filter: exe
          files-folder-recurse: true
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Re-sign updater zip for Tauri after binary signing
        if: matrix.os == 'windows'
        working-directory: apps/desktop
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        # Tauri's bundler signs the update package alongside the binary.
        # Azure resigns the binary (changing its hash), so the .sig that
        # the bundler produced is no longer valid. Run the signer over
        # the resigned installer to refresh its .sig file.
        run: |
          bundle_dir="src-tauri/target/${{ matrix.target }}/release/bundle"
          for installer in "$bundle_dir"/msi/*.msi "$bundle_dir"/nsis/*-setup.exe; do
            [[ -f "$installer" ]] || continue
            zip="$installer.zip"
            (cd "$(dirname "$installer")" && bun x @tauri-apps/cli signer sign "$(basename "$installer")")
            (cd "$(dirname "$zip")" && bun x @tauri-apps/cli signer sign "$(basename "$zip")") 2>/dev/null || true
          done

      # ─── macOS: Developer ID + App Store Connect notarization ─
      - name: Import Apple Developer ID certificate into temporary keychain
        if: matrix.os == 'macos'
        uses: apple-actions/import-codesign-certs@5142e029c445c10ffc7149d172e540235a065466 # v5
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Build, sign, and notarize (macOS)
        if: matrix.os == 'macos'
        working-directory: apps/desktop
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Tauri's bundler uses notarytool with API-key auth when
          # APPLE_API_ISSUER + APPLE_API_KEY + APPLE_API_KEY_PATH are
          # all set. The key file must be on disk; decode the base64
          # secret into runner.temp so it's auto-cleaned up.
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_KEY_PATH: ${{ runner.temp }}/apple-api.p8
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY }}
        # `--verbose --verbose` surfaces signing/notarization log
        # lines (Tauri otherwise hides them behind log::debug). Same
        # rationale as the Windows build step above.
        #
        # `app` produces the .app.tar.gz updater archive; `dmg` is
        # the human-installable image. Bundling `dmg` alone makes
        # Tauri warn "no updater-enabled targets were built. Please
        # enable: app, appimage, msi, nsis" and skip the archive,
        # which is what broke rc.6/7/8's manifest job. Yaak ships
        # both for the same reason.
        run: |
          printf '%s' "$APPLE_API_KEY_BASE64" | base64 -d > "$APPLE_API_KEY_PATH"
          bun run build -- --target ${{ matrix.target }} --bundles app,dmg --verbose --verbose

      # Tauri 2's bundler notarizes + staples the inner .app but
      # leaves the DMG wrapper unnotarized (tauri-apps/tauri#7533,
      # PR #15118 still open). Submit the DMG ourselves and staple
      # the resulting ticket so users on a cold network at first
      # mount don't hit Apple's online Gatekeeper check.
      - name: Notarize and staple DMG
        if: matrix.os == 'macos'
        working-directory: apps/desktop
        env:
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_PATH: ${{ runner.temp }}/apple-api.p8
        shell: bash
        run: |
          printf '%s' "$APPLE_API_KEY_BASE64" | base64 -d > "$APPLE_API_KEY_PATH"
          bundle_dir="src-tauri/target/${{ matrix.target }}/release/bundle"
          for dmg in "$bundle_dir"/dmg/*.dmg; do
            [[ -f "$dmg" ]] || continue
            echo "Notarizing $dmg"
            xcrun notarytool submit "$dmg" \
              --key      "$APPLE_API_KEY_PATH" \
              --key-id   "$APPLE_API_KEY_ID" \
              --issuer   "$APPLE_API_ISSUER" \
              --wait --timeout 30m
            xcrun stapler staple "$dmg"
            xcrun stapler validate "$dmg"
          done

      - name: Rename artifacts to stable, version-less filenames
        # Tauri produces version-stamped names like
        # `Stella_0.0.1_x64-setup.exe`. We collapse them into stable
        # names so the in-app "Download" buttons can use deep links
        # like `https://github.com/<repo>/releases/latest/download/
        # Stella-windows-x64-setup.exe` regardless of the release
        # version. The .sig files for updater archives keep their
        # ordering so latest.json continues to find them.
        shell: bash
        run: bash scripts/rename-desktop-artifacts.sh "apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle"

      - name: Upload installers to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_REF: ${{ needs.resolve.outputs.release_ref }}
        shell: bash
        run: |
          bundle_dir="apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle"
          # `mapfile` is bash 4+; macOS runners ship system bash 3.2,
          # so use a portable while-read loop to populate the array.
          artifacts=()
          while IFS= read -r f; do
            artifacts+=("$f")
          done < <(find "$bundle_dir" -type f -name 'Stella-*')
          if [[ ${#artifacts[@]} -eq 0 ]]; then
            echo "::error::No desktop artifacts found under $bundle_dir"
            exit 1
          fi
          printf '  uploading %s\n' "${artifacts[@]}"
          gh release upload "$RELEASE_REF" "${artifacts[@]}" --clobber

  manifest:
    # Build the Tauri updater manifest (latest.json) referencing the
    # signed artifacts on the GitHub Release. Runs once after every
    # platform finishes so a partial matrix doesn't ship a manifest
    # that promises an installer that doesn't exist.
    needs: [resolve, build]
    if: ${{ needs.resolve.outputs.should_build == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write   # upload latest.json to GitHub Release
      id-token: write   # OIDC for AWS S3 + CloudFront
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          # Pinned to the SHA resolved by the resolve job; never to
          # the bare tag name. See resolve job for rationale.
          ref: ${{ needs.resolve.outputs.release_sha }}

      - name: Build and upload latest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_REF: ${{ needs.resolve.outputs.release_ref }}
          APP_VERSION: ${{ needs.resolve.outputs.app_version }}
          REPO: ${{ github.repository }}
        shell: bash
        run: bash scripts/build-updater-manifest.sh > latest.json && gh release upload "$RELEASE_REF" latest.json --clobber

      # Mirror the manifest to the downloads CDN so the in-app
      # updater (which polls a stable URL on a domain we control)
      # finds the new release. Binaries themselves stay on the
      # GitHub Release; the manifest references them by URL there.
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@a89a83ec143615402a01f672b6e172b7b1875000 # v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_DEPLOY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Mirror latest.json to downloads CDN
        env:
          BUCKET: ${{ vars.DOWNLOADS_BUCKET }}
          DIST_ID: ${{ vars.DOWNLOADS_DIST_ID }}
          # Empty channel ("") => prod feed at /desktop/prod/.
          # rc/beta/etc. => /desktop/<channel>/. Stable users on the
          # default updater feed never see a prerelease manifest.
          CHANNEL: ${{ needs.resolve.outputs.channel }}
        run: |
          channel_dir="${CHANNEL:-prod}"
          key="desktop/$channel_dir/latest.json"
          echo "Publishing to s3://$BUCKET/$key"
          aws s3 cp --no-progress \
            --content-type application/json \
            --cache-control "public, max-age=60, must-revalidate" \
            latest.json \
            "s3://$BUCKET/$key"
          aws cloudfront create-invalidation \
            --distribution-id "$DIST_ID" \
            --paths "/$key" \
            --no-cli-pager > /dev/null

      # Promote the release to "latest" only after the signed
      # installers are attached. release.yml creates the release
      # with --latest=false so /releases/latest/download/Stella-*
      # keeps pointing at the previous fully-built release while
      # this workflow is still building. Prereleases never get the
      # latest flag (GitHub excludes them from /releases/latest by
      # default) so we only flip for stable tags.
      - name: Promote release to latest
        if: ${{ !contains(needs.resolve.outputs.release_ref, '-') }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_REF: ${{ needs.resolve.outputs.release_ref }}
        run: gh release edit "$RELEASE_REF" --latest
