name: OpenSSF Scorecard

on:
  # Run on pushes to main (scored and published)
  push:
    branches: [main]
  # Weekly scan to catch drift
  schedule:
    - cron: "20 7 * * 1"
  workflow_dispatch:

permissions: read-all

jobs:
  scorecard:
    runs-on: ubuntu-latest
    permissions:
      # Required to checkout the repository
      contents: read
      # Required to upload SARIF results to the Security tab
      security-events: write
      # Required for the GITHUB_TOKEN to make API calls
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Run OpenSSF Scorecard
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: results.sarif
