name: OpenSSF Scorecard

on:
  # Run on pushes to main (scored and published)
  push:
    branches: [main]
  # Weekly scan to catch drift
  schedule:
    - cron: "20 7 * * 1"
  workflow_dispatch:

permissions: read-all

jobs:
  scorecard:
    runs-on: ubuntu-latest
    permissions:
      # Required to checkout the repository
      contents: read
      # Required to upload SARIF results to the Security tab
      security-events: write
      # Required for the GITHUB_TOKEN to make API calls
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      # SARIF upload requires GitHub Advanced Security, which
      # is only free for public repositories. Skip gracefully
      # while the repo is private.
      - name: Check if repo is public
        id: visibility
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PRIVATE=$(gh api repos/${{ github.repository }} --jq '.private')
          echo "skip=$PRIVATE" >> "$GITHUB_OUTPUT"

      - name: Run OpenSSF Scorecard
        if: steps.visibility.outputs.skip != 'true'
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          # Do NOT publish to the public OpenSSF REST API
          # while the repository is private. Flip to true
          # once the repo goes public to enable the badge.
          publish_results: false

      - name: Upload SARIF to GitHub Security tab
        if: steps.visibility.outputs.skip != 'true'
        uses: github/codeql-action/upload-sarif@89a39a4e59826350b863aa6b6252a07ad50cf83e # v4.32.4.4.32.42.4.32.4
        with:
          sarif_file: results.sarif
