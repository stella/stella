name: OpenSSF Scorecard

on:
  # Run on pushes to main (scored and published)
  push:
    branches: [main]
  # Weekly scan to catch drift
  schedule:
    - cron: "20 7 * * 1"
  workflow_dispatch:

permissions: read-all

jobs:
  scorecard:
    # Keep the workflow ready for public launch, but skip the job while
    # private so it does not allocate a runner on every push to main.
    # Once the repo is public, set the repository variable
    # `REPO_IS_PUBLIC=true` to re-enable the workflow for all events,
    # including the weekly scheduled scan.
    if: vars.REPO_IS_PUBLIC == 'true'
    runs-on: ubuntu-latest
    permissions:
      # Required to checkout the repository
      contents: read
      # Required to upload SARIF results to the Security tab
      security-events: write
      # Required for the GITHUB_TOKEN to make API calls
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run OpenSSF Scorecard
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          # Do NOT publish to the public OpenSSF REST API
          # while the repository is private. Flip to true
          # once the repo goes public to enable the badge.
          publish_results: false

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@0d579ffd059c29b07949a3cce3983f0780820c98 # v4.32.6.4.32.62.4.32.6
        with:
          sarif_file: results.sarif
