name: OpenSSF Scorecard

on:
  # Run on pushes to main (scored and published)
  push:
    branches: [main]
  # Weekly scan to catch drift
  schedule:
    - cron: "20 7 * * 1"
  workflow_dispatch:

permissions: read-all

jobs:
  scorecard:
    runs-on: ubuntu-latest
    permissions:
      # Required to checkout the repository
      contents: read
      # Required to upload SARIF results to the Security tab
      security-events: write
      # Required for the GITHUB_TOKEN to make API calls
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run OpenSSF Scorecard
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          sarif_file: results.sarif
