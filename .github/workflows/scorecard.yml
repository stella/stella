name: OpenSSF Scorecard

on:
  # Run on pushes to main (scored and published)
  push:
    branches: [main]
  # Weekly scan to catch drift
  schedule:
    - cron: "20 7 * * 1"
  workflow_dispatch:

permissions: read-all

jobs:
  scorecard:
    runs-on: ubuntu-latest
    permissions:
      # Required to checkout the repository
      contents: read
      # Required to upload SARIF results to the Security tab
      security-events: write
      # Required for the GITHUB_TOKEN to make API calls
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run OpenSSF Scorecard
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          sarif_file: results.sarif
