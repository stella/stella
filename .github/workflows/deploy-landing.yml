name: Deploy Landing

# Triggers the landing site deploy on every main merge that
# touches the landing app or shared deps. The public repo cannot
# call private reusable workflows directly, so this dispatches the
# private deploy workflow and watches the resulting run.

on:
  push:
    branches: [main]
    paths:
      - "apps/landing/**"
      - "packages/**"
      - "docs/changelog/**"
      - "bun.lock"
      - ".github/workflows/deploy-landing.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    # Belt-and-suspenders: the trigger above already restricts to
    # main, but a manual dispatch via API can pass a feature ref.
    # The private workflow refuses non-main refs as well.
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Mint App token for the private workflows repo
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.STELLA_RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.STELLA_RELEASE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: private-workflows
          permission-actions: write
          permission-contents: read

      - name: Dispatch and watch deploy-landing.yml
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PRIVATE_WORKFLOWS_REPO: ${{ github.repository_owner }}/private-workflows
          SOURCE_REF: ${{ github.ref }}
          SOURCE_REPOSITORY: ${{ github.repository }}
          SOURCE_SHA: ${{ github.sha }}
          AWS_ROLE_ARN_DEPLOY: ${{ secrets.AWS_ROLE_ARN_DEPLOY }}
        run: |
          dispatched_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          # Must match the `run-name:` template in
          # stella/private-workflows/.github/workflows/deploy-landing.yml.
          expected_title="Deploy landing ${SOURCE_SHA}"
          if ! dispatch_output="$(
            gh workflow run deploy-landing.yml \
              --repo "$PRIVATE_WORKFLOWS_REPO" \
              --field source_repository="$SOURCE_REPOSITORY" \
              --field source_ref="$SOURCE_REF" \
              --field source_sha="$SOURCE_SHA" \
              --field aws_role_arn_deploy="$AWS_ROLE_ARN_DEPLOY" 2>&1
          )"; then
            printf '%s\n' "$dispatch_output" >&2
            exit 1
          fi
          printf '%s\n' "$dispatch_output"

          run_id="$(
            printf '%s\n' "$dispatch_output" \
              | sed -nE 's#.*https://github.com/[^/]+/[^/]+/actions/runs/([0-9]+).*#\1#p' \
              | head -n 1
          )"

          for _ in {1..30}; do
            if [[ -n "$run_id" ]]; then
              break
            fi

            run_id="$(
              gh run list \
                --repo "$PRIVATE_WORKFLOWS_REPO" \
                --workflow deploy-landing.yml \
                --event workflow_dispatch \
                --json databaseId,createdAt,displayTitle \
                --jq ".[] | select(.createdAt >= \"$dispatched_at\") | select(.displayTitle == \"$expected_title\") | .databaseId" \
                --limit 10 \
                | head -n 1
            )"

            if [[ -z "$run_id" ]]; then
              sleep 2
            fi
          done

          if [[ -z "$run_id" ]]; then
            echo "Could not find the dispatched landing deploy workflow run." >&2
            exit 1
          fi

          gh run watch "$run_id" \
            --repo "$PRIVATE_WORKFLOWS_REPO" \
            --compact \
            --exit-status

      - name: Ping IndexNow with sitemap URLs
        # The key file is hosted at apps/landing/public/<key>.txt so
        # search engines can verify ownership. The key is intentionally
        # public (it's served at https://stll.app/<key>.txt), so the
        # gitleaks generic-api-key match below is a false positive.
        # IndexNow is a best-effort SEO notification; a failure here must
        # not fail the deploy, which has already succeeded by this point.
        continue-on-error: true
        env:
          INDEXNOW_KEY: 4a9799deb8f64ac9be5f9b9e140407ca # gitleaks:allow
          HOST: stll.app
        run: |
          # CloudFront can serve a transient 5xx for a short window right
          # after the S3 origin is updated; retry the sitemap fetch and
          # the IndexNow POST instead of failing the deploy on a blip.
          mapfile -t urls < <(
            curl -fsSL \
              --retry 5 --retry-delay 10 --retry-all-errors \
              "https://${HOST}/sitemap-0.xml" \
              | grep -oE '<loc>[^<]+</loc>' \
              | sed -E 's#</?loc>##g'
          )
          if [[ ${#urls[@]} -eq 0 ]]; then
            echo "No URLs found in sitemap; skipping IndexNow ping." >&2
            exit 0
          fi
          payload="$(
            jq -n \
              --arg host "$HOST" \
              --arg key "$INDEXNOW_KEY" \
              --arg keyLocation "https://${HOST}/${INDEXNOW_KEY}.txt" \
              --argjson urlList "$(printf '%s\n' "${urls[@]}" | jq -R . | jq -s .)" \
              '{host: $host, key: $key, keyLocation: $keyLocation, urlList: $urlList}'
          )"
          curl -fsSL -X POST \
            --retry 5 --retry-delay 10 --retry-all-errors \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "$payload" \
            https://api.indexnow.org/indexnow
