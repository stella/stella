name: Publish npm packages

# Keep this filename stable: npm trusted publishing authorizes the calling
# repository workflow, even though the privileged release transaction is
# implemented by stella/.github.
#
# Shared libraries publish from version bumps on main. The CLI remains gated on
# a successful stable Release Artifacts run and the corresponding production
# deployment. Build, lifecycle, pack, and canary commands run without OIDC; only
# the shared release job receives id-token and contents-write permissions.

env:
  NODE_VERSION: "22"

permissions: {}

on:
  push:
    branches: [main]
    paths:
      # Changesets owns these files, so ordinary manifest maintenance cannot
      # accidentally start a release transaction.
      - packages/conditions/CHANGELOG.md
      - packages/template-conditions/CHANGELOG.md
      - packages/docx-utils/CHANGELOG.md
  workflow_run: # zizmor: ignore[dangerous-triggers] the release tag and SHA are revalidated before the release job receives id-token
    workflows: ["Release Artifacts"]
    types: [completed]
  workflow_dispatch:
    inputs:
      package:
        description: Package(s) to publish (dependency order is resolved centrally)
        type: choice
        options:
          - all
          - conditions
          - template-conditions
          - docx-utils
          - cli
        default: all
      publish:
        description: Publish to npm (leave unchecked for a build + pack dry run)
        type: boolean
        default: false
      release_ref:
        description: Stable production release tag; required when manually publishing cli
        required: false
        type: string

concurrency:
  group: publish-npm-${{ github.event.workflow_run.id || github.ref }}
  cancel-in-progress: false

jobs:
  release-trigger:
    name: Resolve release trigger
    runs-on: ubuntu-latest
    permissions:
      actions: read # Download the completed release workflow's source receipt.
    outputs:
      eligible: ${{ steps.source.outputs.eligible }}
      release_ref: ${{ steps.source.outputs.release_ref }}
      release_sha: ${{ steps.source.outputs.release_sha }}
    steps:
      - name: Resolve upstream release receipt
        id: source
        env:
          EVENT_NAME: ${{ github.event_name }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          UPSTREAM_CONCLUSION: ${{ github.event.workflow_run.conclusion || '' }}
          UPSTREAM_RUN_ID: ${{ github.event.workflow_run.id || '' }}
        run: |
          set -euo pipefail
          if [[ "$EVENT_NAME" != "workflow_run" ]]; then
            echo "eligible=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [[ "$UPSTREAM_CONCLUSION" != "success" ]]; then
            echo "eligible=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          receipt_dir="${RUNNER_TEMP}/release-source-receipt"
          gh run download "$UPSTREAM_RUN_ID" \
            --repo "$GITHUB_REPOSITORY" \
            --name release-source-receipt \
            --dir "$receipt_dir"
          receipt="${receipt_dir}/release-source-receipt.json"
          release_ref="$(jq -er '.release_ref | strings' "$receipt")"
          release_sha="$(jq -er '.release_sha | strings' "$receipt")"
          if [[ ! "$release_ref" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-(rc|beta|alpha)\.[0-9]+)?$ ]]; then
            echo "::error::Upstream release receipt has an invalid release_ref: ${release_ref}" >&2
            exit 1
          fi
          if [[ ! "$release_sha" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::Upstream release receipt has an invalid release_sha." >&2
            exit 1
          fi

          eligible=false
          if [[ "$release_ref" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            eligible=true
          fi
          {
            echo "eligible=${eligible}"
            echo "release_ref=${release_ref}"
            echo "release_sha=${release_sha}"
          } >> "$GITHUB_OUTPUT"

  pack:
    name: Build and pack
    needs: release-trigger
    if: ${{ needs.release-trigger.outputs.eligible == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read # deliberately NO id-token: untrusted build scripts run here
    outputs:
      package_files: ${{ steps.pack.outputs.package_files }}
      packages: ${{ steps.pack.outputs.packages }}
      source_sha: ${{ steps.pack.outputs.source_sha }}
    steps:
      - name: Resolve trusted source
        id: source
        env:
          EVENT_NAME: ${{ github.event_name }}
          MANUAL_PACKAGE: ${{ inputs.package || '' }}
          MANUAL_PUBLISH: ${{ inputs.publish || false }}
          MANUAL_RELEASE_REF: ${{ inputs.release_ref || '' }}
          RUN_SHA: ${{ github.sha }}
          UPSTREAM_SHA: ${{ needs.release-trigger.outputs.release_sha }}
        run: |
          set -euo pipefail
          source_ref="$RUN_SHA"
          if [[ "$EVENT_NAME" == "workflow_run" ]]; then
            source_ref="$UPSTREAM_SHA"
          elif [[ "$EVENT_NAME" == "workflow_dispatch" && "$MANUAL_PUBLISH" == "true" && ( "$MANUAL_PACKAGE" == "cli" || "$MANUAL_PACKAGE" == "all" ) ]]; then
            if [[ -z "$MANUAL_RELEASE_REF" ]]; then
              echo "::error::release_ref is required to manually publish the CLI." >&2
              exit 1
            fi
            source_ref="$MANUAL_RELEASE_REF"
          fi
          echo "ref=${source_ref}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ steps.source.outputs.ref }}

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - run: bun install --frozen-lockfile

      - name: Build and pack selected packages
        id: pack
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          MANUAL_PACKAGE: ${{ inputs.package || 'all' }}
        run: |
          set -euo pipefail
          if [[ "$EVENT_NAME" == "workflow_run" ]]; then
            pkgs=(cli)
          elif [[ "$EVENT_NAME" == "push" ]]; then
            pkgs=(conditions template-conditions docx-utils)
          else
            case "$MANUAL_PACKAGE" in
              all) pkgs=(conditions template-conditions docx-utils cli) ;;
              *) pkgs=("$MANUAL_PACKAGE") ;;
            esac
          fi

          for package in "${pkgs[@]}"; do
            echo "::group::Build + pack @stll/${package}"
            (cd "packages/${package}" && bun run build)
            bun scripts/prepare-publish.ts "packages/${package}"
            destination="release-artifacts/${package}"
            mkdir -p "$destination"
            (cd "packages/${package}" && bun pm pack --destination "${GITHUB_WORKSPACE}/${destination}")
            echo "::endgroup::"
          done

          packages="$(printf '%s\n' "${pkgs[@]}" | jq -Rnc '[inputs]')"
          echo "packages=${packages}" >> "$GITHUB_OUTPUT"
          echo "source_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          {
            echo "package_files<<PACKAGE_FILES"
            printf 'packages/%s/package.json\n' "${pkgs[@]}"
            echo "PACKAGE_FILES"
          } >> "$GITHUB_OUTPUT"

      - name: Validate CLI release source
        id: release-source
        if: >-
          contains(fromJSON(steps.pack.outputs.packages), 'cli')
          && (github.event_name == 'workflow_run' || inputs.publish)
        env:
          EVENT_NAME: ${{ github.event_name }}
          MANUAL_RELEASE_REF: ${{ inputs.release_ref || '' }}
          UPSTREAM_RELEASE_REF: ${{ needs.release-trigger.outputs.release_ref }}
        run: |
          set -euo pipefail
          release_ref="$MANUAL_RELEASE_REF"
          if [[ "$EVENT_NAME" == "workflow_run" ]]; then
            release_ref="$UPSTREAM_RELEASE_REF"
          fi
          if [[ ! "$release_ref" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::CLI publication requires a stable vX.Y.Z release; got '${release_ref}'." >&2
            exit 1
          fi

          if git ls-remote --exit-code --heads origin "refs/heads/${release_ref}" >/dev/null 2>&1; then
            echo "::error::A branch named ${release_ref} exists alongside the release tag; refusing ambiguous publication." >&2
            exit 1
          fi
          git fetch --no-tags origin \
            "refs/tags/${release_ref}:refs/tags/${release_ref}" \
            main:refs/remotes/origin/main

          source_sha="$(git rev-parse HEAD)"
          release_sha="$(git rev-parse "refs/tags/${release_ref}^{commit}")"
          if [[ "$source_sha" != "$release_sha" ]]; then
            echo "::error::Checked-out source ${source_sha} does not match ${release_ref} (${release_sha})." >&2
            exit 1
          fi
          if ! git merge-base --is-ancestor "$release_sha" origin/main; then
            echo "::error::${release_ref} is not reachable from protected main." >&2
            exit 1
          fi
          if [[ "$(tr -d '[:space:]' < VERSION)" != "${release_ref#v}" ]]; then
            echo "::error::VERSION does not match ${release_ref}." >&2
            exit 1
          fi
          echo "expected_production_commit=${release_sha}" >> "$GITHUB_OUTPUT"

      - name: Set up Node for the CLI smoke test
        if: contains(fromJSON(steps.pack.outputs.packages), 'cli')
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Smoke-test the packed CLI under plain Node # zizmor: ignore[adhoc-packages] intentionally installs the locally packed artifact as a consumer
        if: contains(fromJSON(steps.pack.outputs.packages), 'cli')
        shell: bash
        run: |
          set -euo pipefail
          tarball="$(ls "${GITHUB_WORKSPACE}/release-artifacts/cli"/*.tgz)"
          smoke="$(mktemp -d)"
          cd "$smoke"
          npm init -y >/dev/null
          npm install --ignore-scripts "$tarball"
          cli="node_modules/@stll/cli/dist/cli.js"
          node "$cli" --version
          node "$cli" --help

      - name: Wait for the corresponding API release in production
        if: >-
          contains(fromJSON(steps.pack.outputs.packages), 'cli')
          && (github.event_name == 'workflow_run' || inputs.publish)
        env:
          API_DEPLOYMENT_EXPECTED_COMMIT: ${{ steps.release-source.outputs.expected_production_commit }}
          API_DEPLOYMENT_URL: https://api.stll.app
        run: bun scripts/check-api-deployment.ts

      - name: Canary the exact packed CLI against production # zizmor: ignore[adhoc-packages] the exact local tarball is the canary subject
        if: >-
          contains(fromJSON(steps.pack.outputs.packages), 'cli')
          && (github.event_name == 'workflow_run' || inputs.publish)
        shell: bash
        run: |
          set -euo pipefail
          tarball="$(ls "${GITHUB_WORKSPACE}/release-artifacts/cli"/*.tgz)"
          canary="$(mktemp -d)"
          cd "$canary"
          npm init -y >/dev/null
          npm install --ignore-scripts "$tarball"
          node node_modules/@stll/cli/dist/cli.js compatibility check \
            --server https://api.stll.app

      - name: Upload conditions tarball
        if: contains(fromJSON(steps.pack.outputs.packages), 'conditions')
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: npm-tarball-conditions
          path: release-artifacts/conditions/
          retention-days: 1
          if-no-files-found: error

      - name: Upload template-conditions tarball
        if: contains(fromJSON(steps.pack.outputs.packages), 'template-conditions')
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: npm-tarball-template-conditions
          path: release-artifacts/template-conditions/
          retention-days: 1
          if-no-files-found: error

      - name: Upload docx-utils tarball
        if: contains(fromJSON(steps.pack.outputs.packages), 'docx-utils')
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: npm-tarball-docx-utils
          path: release-artifacts/docx-utils/
          retention-days: 1
          if-no-files-found: error

      - name: Upload cli tarball
        if: contains(fromJSON(steps.pack.outputs.packages), 'cli')
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: npm-tarball-cli
          path: release-artifacts/cli/
          retention-days: 1
          if-no-files-found: error

  release:
    name: Publish selected packages
    needs: pack
    if: >-
      needs.pack.result == 'success'
      && (github.event_name == 'workflow_run'
      || (github.ref == 'refs/heads/main'
      && (github.event_name == 'push' || inputs.publish)))
    permissions:
      contents: write # Create immutable package tags and GitHub releases.
      id-token: write # Exchange a short-lived npm trusted-publishing credential.
    # The repository owner publishes this versioned shared contract.
    uses: stella/.github/.github/workflows/npm-independent-release.yml@v1.2.0 # zizmor: ignore[unpinned-uses]
    with:
      artifact-pattern: npm-tarball-*
      package-files: ${{ needs.pack.outputs.package_files }}
      source-ref: ${{ needs.pack.outputs.source_sha }}
    secrets:
      RELEASE_APP_ID: ${{ secrets.STELLA_RELEASE_APP_ID }}
      RELEASE_APP_PRIVATE_KEY: ${{ secrets.STELLA_RELEASE_APP_PRIVATE_KEY }}
