name: auth.md Spec Drift Check

# We implement the auth.md agent-registration protocol against a pinned
# version. It is a fast-moving pre-1.0 open protocol, so this nightly job
# diffs our pin against upstream (workos/auth.md) and fails when the spec
# moves — turning a silent upstream change into a reviewable signal so we
# can reconcile our manifest/discovery/flow handlers before drifting out
# of conformance.

on:
  schedule:
    # 04:47 UTC daily (off-minute; staggered after the model-catalog job)
    - cron: "47 4 * * *"
  workflow_dispatch:

permissions: {}

jobs:
  auth-md-spec-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: "package.json"

      - name: Install dependencies
        run: bun ci --ignore-scripts
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Check auth.md spec for upstream drift
        run: bun run check:auth-md-spec
        env:
          GITHUB_TOKEN: ${{ github.token }}
