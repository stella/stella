name: Build

on:
  push:
    branches: [main]
    paths:
      - "apps/**"
      - "packages/**"
      - "bun.lock"
      - "bunfig.toml"
      - "package.json"
      - "turbo.json"
      - "tsconfig*.json"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: "package.json"

      - name: Turbo remote cache
        uses: rharkor/caching-for-turbo@0abc2381e688c4d2832f0665a68a01c6e82f0d6c # v2.3.11
        with:
          max-age: 7d

      - name: Install dependencies
        run: bun ci

      - name: Prepare environment
        run: |
          cd ./apps/api
          mv .env.example .env
          cd ../web
          mv .env.example .env

      - name: Vite config smoke test
        run: bun test apps/web/vite.config.test.ts

      - name: Build
        run: bun run build
