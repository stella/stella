services:
  postgres:
    profiles: [dev]
    # Keep dev aligned with infra. Postgres 18 expects the volume
    # mounted at /var/lib/postgresql, not /var/lib/postgresql/data.
    # After switching from the old layout, recreate local pgdata with
    # `bun run --cwd apps/api docker:reset-dev`.
    image: postgres:18.3
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: stella
    ports:
      - "${STELLA_PG_HOST_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    profiles: [dev]
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "${STELLA_MINIO_HOST_PORT:-9000}:9000"
      - "${STELLA_MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - s3data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-setup:
    profiles: [dev]
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb local/stella --ignore-existing
      "

  valkey:
    profiles: [dev]
    image: valkey/valkey:8-alpine
    ports:
      - "${STELLA_VALKEY_HOST_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  gotenberg:
    profiles: [dev]
    image: gotenberg/gotenberg:8
    # If you see "context deadline exceeded" or multi-threading errors, add
    # command: ["gotenberg", "--libreoffice-restart-after=1"]. See
    # https://github.com/gotenberg/gotenberg/issues/1452.
    ports:
      - "${STELLA_GOTENBERG_HOST_PORT:-3003}:3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  s3data:
