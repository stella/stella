services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file:
      - ${STELLA_API_ENV_FILE:-apps/api/.env}
    environment:
      NODE_ENV: production
    ports:
      - "${STELLA_API_HOST_PORT:-3001}:3001"
    depends_on:
      gotenberg:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "-e",
          "const response = await fetch('http://127.0.0.1:3001/health', { signal: AbortSignal.timeout(4000) }); if (!response.ok) process.exit(1);",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: ${STELLA_API_PIDS_LIMIT:-512}
    mem_limit: ${STELLA_API_MEM_LIMIT:-2g}
    cpus: ${STELLA_API_CPUS:-2.0}

  gotenberg:
    image: gotenberg/gotenberg:8
    environment:
      API_ENABLE_BASIC_AUTH: "true"
      GOTENBERG_API_BASIC_AUTH_USERNAME: ${GOTENBERG_USERNAME:?set GOTENBERG_USERNAME in the Compose env file}
      GOTENBERG_API_BASIC_AUTH_PASSWORD: ${GOTENBERG_PASSWORD:?set GOTENBERG_PASSWORD in the Compose env file}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'curl -fsS -u "$${GOTENBERG_API_BASIC_AUTH_USERNAME}:$${GOTENBERG_API_BASIC_AUTH_PASSWORD}" http://localhost:3000/health',
        ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    pids_limit: ${STELLA_GOTENBERG_PIDS_LIMIT:-1024}
    mem_limit: ${STELLA_GOTENBERG_MEM_LIMIT:-1g}
    cpus: ${STELLA_GOTENBERG_CPUS:-1.0}
