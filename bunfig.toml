[install]
linker = "hoisted"
# 5-day quarantine: reject package versions published
# less than 5 days ago to mitigate supply chain attacks.
minimumReleaseAge = 432_000
# First-party @stll packages are on public npm (open source).
# They share a release cadence and would otherwise be blocked
# by the quarantine on every publish cycle.
minimumReleaseAgeExcludes = [
  "@stll/oxlint-config",
  "@stll/typescript-config",
  "@stll/aho-corasick-wasm",
  "@stll/anonymize-data",
  "@stll/anonymize-wasm",
  "@stll/docx-core",
  "@stll/folio-agents",
  "@stll/folio-core",
  "@stll/folio-react",
  "@stll/fuzzy-search-wasm",
  "@stll/regex-set-wasm",
  "@stll/stdnum",
  "@stll/text-search-wasm",
  # Security fix for GHSA-v2hh-gcrm-f6hx. The patched release has not yet
  # cleared quarantine, so opt in to this package only; keep all others gated.
  "fast-uri",
  # Transitive exact pin from @tanstack/ai-openrouter 0.15.6; fresh
  # inside quarantine as part of the TanStack AI 0.39 provider batch.
  "@openrouter/sdk",
  # TanStack AI beta: opted in ahead of stable for the AI SDK migration.
  "@tanstack/ai",
  "@tanstack/ai-anthropic",
  "@tanstack/ai-code-mode",
  "@tanstack/ai-bedrock",
  "@tanstack/ai-client",
  "@tanstack/ai-event-client",
  "@tanstack/ai-gemini",
  "@tanstack/ai-mcp",
  "@tanstack/ai-mistral",
  "@tanstack/ai-openai",
  "@tanstack/ai-openrouter",
  "@tanstack/ai-react",
  "@tanstack/ai-utils",
  "@tanstack/react-ai-devtools",
  # TanStack Table v9 beta: opted in ahead of stable to adopt the
  # tree-shakable feature/plugin model, granular re-render control,
  # and table devtools. Remove once v9 ships stable and clears the
  # 5-day quarantine on its own.
  "@tanstack/react-table",
  "@tanstack/table-core",
  "@tanstack/react-table-devtools",
  "@tanstack/table-devtools",
  "@tanstack/openai-base",
  # TypeScript 7 stable: opted in immediately for the native compiler
  # migration. Remove once the release family clears quarantine.
  "typescript",
  "@typescript/native",
  "@typescript/typescript-aix-ppc64",
  "@typescript/typescript-darwin-arm64",
  "@typescript/typescript-darwin-x64",
  "@typescript/typescript-freebsd-arm64",
  "@typescript/typescript-freebsd-x64",
  "@typescript/typescript-linux-arm",
  "@typescript/typescript-linux-arm64",
  "@typescript/typescript-linux-loong64",
  "@typescript/typescript-linux-mips64el",
  "@typescript/typescript-linux-ppc64",
  "@typescript/typescript-linux-riscv64",
  "@typescript/typescript-linux-s390x",
  "@typescript/typescript-linux-x64",
  "@typescript/typescript-netbsd-arm64",
  "@typescript/typescript-netbsd-x64",
  "@typescript/typescript-openbsd-arm64",
  "@typescript/typescript-openbsd-x64",
  "@typescript/typescript-sunos-x64",
  "@typescript/typescript-win32-arm64",
  "@typescript/typescript-win32-x64",
  "drizzle-kit",
  "drizzle-orm",
]
